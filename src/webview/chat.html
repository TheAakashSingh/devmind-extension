<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data: blob: __CSP_SOURCE__; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline';" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a10;
    --bg-elev: #0f0f17;
    --bg-card: rgba(255,255,255,.03);
    --line: rgba(255,255,255,.08);
    --line-strong: rgba(255,255,255,.14);
    --text: #f4f5fa;
    --muted: #8a8fa3;
    --dim: #5c6175;
    --accent: #a78bfa;
    --accent-2: #60a5fa;
    --accent-3: #f0abfc;
    --ok: #4ade80;
    --danger: #f87171;
    --ease: cubic-bezier(.2,.8,.2,1);
    --code-bg: #0d1117;
    --code-border: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', var(--vscode-font-family, -apple-system, system-ui, sans-serif);
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
    background: var(--bg);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .shell { height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev);
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; font-size: 13.5px;
    letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    display: grid; place-items: center;
    background: rgba(255, 255, 255, .04) url('__LOGO_URI__') center/100% no-repeat;
    color: transparent; font-size: 0; text-indent: -9999px; overflow: hidden;
  }
  .brand .sub {
    font-size: 10.5px; font-weight: 500; color: var(--muted);
    display: block; margin-top: 1px;
  }
  .header-actions { display: flex; gap: 4px; }
  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 180ms var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--bg-card); border-color: var(--line-strong); }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 4px; }
  .messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.12); }

  /* ── Welcome ── */
  .welcome {
    padding: 22px 20px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(167,139,250,.08), rgba(96,165,250,.02));
    border: 1px solid rgba(167,139,250,.2);
    text-align: center;
  }
  .welcome h3 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.015em; }
  .welcome p { margin: 8px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
  .welcome-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 38px; padding: 0 16px; border-radius: 9px; border: 1px solid transparent;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 180ms var(--ease); text-decoration: none; width: 100%;
  }
  .btn-primary { background: #fff; color: #0a0a0f; box-shadow: 0 1px 0 rgba(255,255,255,.2) inset; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-ghost { background: var(--bg-card); color: var(--text); border-color: var(--line-strong); }
  .btn-ghost:hover { background: rgba(255,255,255,.06); }

  .suggestions { display: grid; gap: 8px; }
  .suggest {
    padding: 11px 13px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--line);
    color: #d5d7e0; cursor: pointer; font-size: 13px; text-align: left;
    transition: all 180ms var(--ease); display: flex; align-items: center; gap: 10px;
  }
  .suggest:hover { border-color: var(--line-strong); background: rgba(255,255,255,.04); transform: translateY(-1px); }
  .suggest-icon {
    flex: 0 0 auto; width: 22px; height: 22px; border-radius: 6px;
    background: rgba(167,139,250,.12); color: var(--accent); display: grid; place-items: center;
  }
  .suggest-title { font-weight: 600; font-size: 12.5px; }
  .suggest-desc { color: var(--muted); font-size: 11.5px; }

  /* ── Chat Bubbles ── */
  .msg {
    max-width: 100%; padding: 12px 14px; border-radius: 14px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 13.5px;
  }
  .msg.user {
    align-self: flex-end; max-width: 90%;
    background: linear-gradient(135deg, rgba(167,139,250,.14), rgba(96,165,250,.1));
    border: 1px solid rgba(167,139,250,.22); border-bottom-right-radius: 5px; color: #f4f5fa;
  }
  .msg.bot {
    align-self: flex-start; background: var(--bg-card); border: 1px solid var(--line);
    border-bottom-left-radius: 5px; color: #d5d7e0; padding: 16px;
  }
  .msg.bot .author {
    display: flex; align-items: center; gap: 7px;
    font-weight: 700; font-size: 11.5px; color: var(--accent);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .msg.bot .author-mark {
    width: 16px; height: 16px; border-radius: 4px;
    background: rgba(255, 255, 255, .04) url('__LOGO_URI__') center/100% no-repeat;
    color: transparent; font-size: 0; text-indent: -9999px; overflow: hidden; display: grid; place-items: center;
  }
  .msg.error {
    align-self: stretch; background: rgba(248,113,113,.08);
    border: 1px solid rgba(248,113,113,.22); color: #fca5a5;
  }

  /* ── Markdown Content ── */
  .msg-content { line-height: 1.7; }
  .msg-content p { margin: 0 0 12px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content h1, .msg-content h2, .msg-content h3 {
    margin: 16px 0 8px; font-weight: 600; font-size: 14px;
  }
  .msg-content h1:first-child, .msg-content h2:first-child, .msg-content h3:first-child { margin-top: 0; }
  .msg-content ul, .msg-content ol { margin: 0 0 12px; padding-left: 20px; }
  .msg-content li { margin: 4px 0; }
  .msg-content code:not(pre code) {
    background: rgba(167,139,250,.15); color: #c4b5fd; padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  }
  .msg-content pre {
    margin: 12px 0; padding: 14px; border-radius: 10px; background: var(--code-bg);
    border: 1px solid var(--code-border); overflow-x: auto;
  }
  .msg-content pre code {
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.6;
    color: #e6edf3; white-space: pre;
  }

  /* ── Code Block Header ── */
  .code-block {
    margin: 12px 0; border-radius: 10px; background: var(--code-bg);
    border: 1px solid var(--code-border); overflow: hidden;
  }
  .code-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: rgba(255,255,255,.03);
    border-bottom: 1px solid var(--code-border);
  }
  .code-lang {
    font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }
  .code-header-actions {
    display: flex; gap: 4px;
  }
  .code-action-btn {
    padding: 4px 8px; border-radius: 5px; border: 1px solid var(--line);
    background: transparent; color: var(--muted); font-size: 11px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: all 120ms var(--ease);
  }
  .code-action-btn:hover { background: var(--bg-card); color: var(--text); border-color: var(--line-strong); }
  .code-action-btn.accept { border-color: rgba(74,222,128,.4); color: #86efac; }
  .code-action-btn.accept:hover { background: rgba(74,222,128,.15); }
  .code-action-btn.revert { border-color: rgba(248,113,113,.4); color: #fca5a5; }
  .code-action-btn.revert:hover { background: rgba(248,113,113,.15); }
  .code-block pre { margin: 0; padding: 14px; border: none; border-radius: 0; }

  /* ── Reasoning/Thinking ── */
  .reasoning {
    padding: 10px 12px; margin-bottom: 12px;
    border-radius: 8px; background: rgba(96,165,250,.08);
    border: 1px solid rgba(96,165,250,.15);
  }
  .reasoning-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--accent-2); font-weight: 600;
    margin-bottom: 6px;
  }
  .reasoning-content {
    font-size: 12.5px; color: var(--muted); line-height: 1.6;
  }
  .reasoning-spinner {
    display: inline-flex; gap: 3px; align-items: center;
  }
  .reasoning-spinner span {
    width: 4px; height: 4px; border-radius: 50%; background: var(--accent-2);
    animation: spin 1.2s infinite ease-in-out;
  }
  .reasoning-spinner span:nth-child(2) { animation-delay: 0.1s; }
  .reasoning-spinner span:nth-child(3) { animation-delay: 0.2s; }
  @keyframes spin {
    0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
    30% { transform: scale(1.5); opacity: 1; }
  }

  /* ── Attachments ── */
  .attachments {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 10px; border-bottom: 1px solid var(--line); min-height: 36px;
  }
  .attachment {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.25);
    font-size: 11.5px; color: #93c5fd;
  }
  .attachment img { width: 16px; height: 16px; border-radius: 3px; object-fit: cover; }
  .attachment-remove {
    width: 14px; height: 14px; border: none; background: transparent;
    color: inherit; cursor: pointer; display: grid; place-items: center; opacity: 0.7;
  }
  .attachment-remove:hover { opacity: 1; }

  /* ── @ mention dropdown ── */
  .mention-dropdown {
    position: absolute; bottom: 100%; left: 0; right: 0;
    max-height: 240px; overflow-y: auto;
    background: var(--bg-elev); border: 1px solid var(--line-strong);
    border-radius: 10px 10px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,.3); z-index: 100;
  }
  .mention-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    cursor: pointer; transition: background 120ms var(--ease);
  }
  .mention-item:hover, .mention-item.selected { background: rgba(255,255,255,.05); }
  .mention-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(167,139,250,.12); color: var(--accent);
    display: grid; place-items: center; font-size: 12px;
  }
  .mention-name { font-weight: 600; font-size: 13px; }
  .mention-path { font-size: 11px; color: var(--muted); }

  /* ── Composer ── */
  .composer-wrap {
    padding: 10px 12px 14px; background: var(--bg);
    border-top: 1px solid var(--line); position: relative;
  }
  .composer {
    display: flex; flex-direction: column; gap: 8px; padding: 10px;
    border-radius: 12px; background: var(--bg-elev); border: 1px solid var(--line);
    transition: border-color 180ms var(--ease);
  }
  .composer:focus-within { border-color: var(--accent); }
  textarea {
    width: 100%; min-height: 36px; max-height: 140px; resize: none;
    padding: 6px 4px; border: 0; background: transparent;
    color: var(--text); font-family: inherit; font-size: 13.5px; line-height: 1.5; outline: none;
  }
  textarea::placeholder { color: var(--dim); }
  .composer-row {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .composer-tools { display: flex; gap: 4px; }
  .tool-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--line);
    background: transparent; color: var(--muted); cursor: pointer;
    display: grid; place-items: center; transition: all 180ms var(--ease);
  }
  .tool-btn:hover { color: var(--text); background: var(--bg-card); border-color: var(--line-strong); }
  .composer-hint { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; }
  .send-btn {
    width: 30px; height: 30px; border-radius: 8px; border: 0;
    background: #fff; color: #0a0a0f; display: grid; place-items: center;
    cursor: pointer; transition: all 180ms var(--ease);
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn:hover:not(:disabled) { transform: translateY(-1px); }

  /* ── Status Footer ── */
  .status {
    padding: 8px 14px; display: flex; justify-content: space-between;
    align-items: center; gap: 8px; font-size: 11px; color: var(--dim);
    border-top: 1px solid var(--line); background: var(--bg-elev);
  }
  .status .quota { display: inline-flex; align-items: center; gap: 6px; }
  .quota-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok); box-shadow: 0 0 8px var(--ok);
  }

  /* ── Hidden inputs ── */
  #file-input, #image-input { display: none; }
</style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="brand">
        <span class="brand-mark">D</span>
        <span>DevMind<span class="sub">AI pair programmer</span></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-new" title="New chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button class="icon-btn" id="btn-clear" title="Clear conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer-wrap">
      <div class="attachments" id="attachments" style="display:none;"></div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Ask about your code, or @ mention a file..."></textarea>
        <div class="composer-row">
          <div class="composer-tools">
            <button class="tool-btn" id="btn-attach" title="Attach file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="tool-btn" id="btn-image" title="Attach image">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
          </div>
          <span class="composer-hint">⏎ to send · ⇧⏎ for newline</span>
          <button class="send-btn" id="send" title="Send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="status">
      <span class="quota"><span class="quota-dot"></span> <span id="usage-text">Ready</span></span>
      <span id="plan-text"></span>
    </div>
  </div>

  <input type="file" id="file-input" accept=".ts,.js,.tsx,.jsx,.json,.md,.css,.html,.py,.go,.rs,.java" multiple />
  <input type="file" id="image-input" accept="image/*" multiple />

<script>
const vscode = acquireVsCodeApi();
const hasApiKey = __HAS_API_KEY__;
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');
const clearBtn = document.getElementById('btn-clear');
const newBtn = document.getElementById('btn-new');
const attachBtn = document.getElementById('btn-attach');
const imageBtn = document.getElementById('btn-image');
const fileInput = document.getElementById('file-input');
const imageInput = document.getElementById('image-input');
const attachmentsEl = document.getElementById('attachments');

let currentBot = null;
let sending = false;
let attachments = [];
let mentionShow = false;
let mentionResults = [];
let mentionIndex = -1;
let lastInputPos = 0;

function createSuggestion(title, desc, prompt) {
  const btn = document.createElement('button');
  btn.className = 'suggest';
  btn.innerHTML = '<span class="suggest-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></span><div><div class="suggest-title">' + title + '</div><div class="suggest-desc">' + desc + '</div></div>';
  btn.onclick = () => { input.value = prompt; autoResize(); input.focus(); };
  return btn;
}

function addWelcome() {
  messages.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'welcome';

  if (hasApiKey) {
    wrap.innerHTML = '<h3>Ready when you are.</h3><p>Ask anything about your code, or pick a suggestion below to get started.</p>';
    messages.appendChild(wrap);

    const sugg = document.createElement('div');
    sugg.className = 'suggestions';
    sugg.style.marginTop = '14px';
    sugg.appendChild(createSuggestion('Explain this file', 'Get a concise walkthrough', 'Explain what the current file does'));
    sugg.appendChild(createSuggestion('Add error handling', 'Wrap calls safely', 'Add proper error handling to the current file'));
    sugg.appendChild(createSuggestion('Write tests', 'Unit tests for the active code', 'Write unit tests for the current file'));
    sugg.appendChild(createSuggestion('Refactor for clarity', 'Clean up naming + structure', 'Refactor this code for clarity and readability'));
    messages.appendChild(sugg);
  } else {
    wrap.innerHTML = '<h3>Sign in to DevMind</h3><p>Create a free account in VS Code — no browser detour, no API keys to paste.</p><div class="welcome-actions"><button class="btn btn-primary" id="welcome-signin">Sign in</button><button class="btn btn-ghost" id="welcome-key">I have an API key</button></div>';
    messages.appendChild(wrap);
    document.getElementById('welcome-signin').onclick = () => vscode.postMessage({ type: 'openOnboarding' });
    document.getElementById('welcome-key').onclick = () => vscode.postMessage({ type: 'setKey' });
  }
}

function parseMarkdown(text) {
  let html = text
    .replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const language = lang || 'code';
      const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return '<div class="code-block"><div class="code-header"><span class="code-lang">' + language + '</span><div class="code-header-actions"><button class="code-action-btn" onclick="copyCode(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy</button><button class="code-action-btn accept" onclick="acceptCode(this)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>Accept</button></div></div><pre><code>' + escapedCode.trim() + '</code></pre></div>';
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(.+)$/gm, (match) => {
      if (match.startsWith('<')) return match;
      return match;
    });
  
  return '<div class="msg-content"><p>' + html + '</p></div>';
}

function addMessage(kind, text, hasCode = false) {
  const node = document.createElement('div');
  node.className = 'msg ' + kind;
  
  if (kind === 'bot') {
    const author = document.createElement('div');
    author.className = 'author';
    author.innerHTML = '<span class="author-mark">D</span> DevMind AI';
    node.appendChild(author);
    
    if (hasCode) {
      node.innerHTML += parseMarkdown(text);
      node._code = text;
    } else {
      const body = document.createElement('div');
      body.innerHTML = parseMarkdown(text);
      node.appendChild(body);
    }
  } else {
    node.textContent = text;
  }
  
  messages.appendChild(node);
  messages.scrollTop = messages.scrollHeight;
  return node;
}

function addTyping() {
  const node = document.createElement('div');
  node.className = 'msg bot';
  node.innerHTML = '<div class="author"><span class="author-mark">D</span> DevMind AI</div><div class="typing"><span></span><span></span><span></span></div>';
  messages.appendChild(node);
  messages.scrollTop = messages.scrollHeight;
  return node;
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
}

function renderAttachments() {
  if (attachments.length === 0) {
    attachmentsEl.style.display = 'none';
    attachmentsEl.innerHTML = '';
    return;
  }
  attachmentsEl.style.display = 'flex';
  attachmentsEl.innerHTML = attachments.map((att, i) => {
    if (att.type === 'image') {
      return '<div class="attachment"><img src="' + att.dataUrl + '" /><span>' + att.name + '</span><button class="attachment-remove" onclick="removeAttachment(' + i + ')">×</button></div>';
    }
    return '<div class="attachment"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + att.name + '<button class="attachment-remove" onclick="removeAttachment(' + i + ')">×</button></div>';
  }).join('');
}

function sendMessage() {
  const text = input.value.trim();
  if (!text || sending) return;

  const welcomeEl = messages.querySelector('.welcome');
  if (welcomeEl) messages.innerHTML = '';

  addMessage('user', text);
  input.value = '';
  autoResize();

  currentBot = addTyping();
  sending = true;
  send.disabled = true;
  vscode.postMessage({ type: 'chat', text: text, attachments: attachments });
  
  attachments = [];
  renderAttachments();
}

window.copyCode = function(btn) {
  const codeBlock = btn.closest('.code-block');
  const code = codeBlock.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>Copied';
    setTimeout(() => {
      btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy';
    }, 2000);
  });
};

window.acceptCode = function(btn) {
  const codeBlock = btn.closest('.code-block');
  const code = codeBlock.querySelector('code').textContent;
  vscode.postMessage({ type: 'insertCode', code });
  btn.closest('.code-block').style.opacity = '0.5';
  btn.disabled = true;
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>Accepted';
};

window.removeAttachment = function(i) {
  attachments.splice(i, 1);
  renderAttachments();
};

function showMentionDropdown(results) {
  mentionResults = results;
  mentionIndex = -1;
  
  const existing = document.querySelector('.mention-dropdown');
  if (existing) existing.remove();

  if (results.length === 0) return;

  const drop = document.createElement('div');
  drop.className = 'mention-dropdown';
  results.slice(0, 8).forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'mention-item';
    item.innerHTML = '<span class="mention-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><div><div class="mention-name">' + f.name + '</div><div class="mention-path">' + f.path + '</div></div>';
    item.onclick = () => selectMention(f);
    item.dataset.index = i;
    drop.appendChild(item);
  });
  
  document.querySelector('.composer-wrap').appendChild(drop);
}

function selectMention(file) {
  const before = input.value.slice(0, lastInputPos);
  const after = input.value.slice(input.selectionStart);
  input.value = before + '@' + file.name + ' ' + after;
  
  const drop = document.querySelector('.mention-dropdown');
  if (drop) drop.remove();
  mentionShow = false;
  
  autoResize();
  input.focus();
}

send.onclick = sendMessage;
clearBtn.onclick = () => vscode.postMessage({ type: 'clear' });
newBtn.onclick = () => vscode.postMessage({ type: 'clear' });

input.addEventListener('input', () => {
  autoResize();
  
  const pos = input.selectionStart;
  const before = input.value.slice(0, pos);
  const lastAt = before.lastIndexOf('@');
  
  if (lastAt !== -1) {
    const after = before.slice(lastAt + 1);
    if (!after.includes(' ') && after.length > 0) {
      mentionShow = true;
      lastInputPos = lastAt;
      vscode.postMessage({ type: 'searchFiles', query: after });
    } else {
      const drop = document.querySelector('.mention-dropdown');
      if (drop) drop.remove();
      mentionShow = false;
    }
  } else {
    const drop = document.querySelector('.mention-dropdown');
    if (drop) drop.remove();
    mentionShow = false;
  }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    if (mentionShow) {
      const drop = document.querySelector('.mention-dropdown');
      if (drop) {
        e.preventDefault();
        const items = drop.querySelectorAll('.mention-item');
        if (items.length > 0) {
          const selected = drop.querySelector('.mention-item.selected') || items[0];
          selected.click();
        }
        return;
      }
    }
    e.preventDefault();
    sendMessage();
  }
  
  if (mentionShow) {
    const drop = document.querySelector('.mention-dropdown');
    if (drop) {
      const items = Array.from(drop.querySelectorAll('.mention-item'));
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        mentionIndex = Math.min(mentionIndex + 1, items.length - 1);
        items.forEach((it, i) => it.classList.toggle('selected', i === mentionIndex));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        mentionIndex = Math.max(mentionIndex - 1, 0);
        items.forEach((it, i) => it.classList.toggle('selected', i === mentionIndex));
      } else if (e.key === 'Enter' && mentionIndex >= 0) {
        e.preventDefault();
        items[mentionIndex].click();
      } else if (e.key === 'Escape') {
        drop.remove();
        mentionShow = false;
      }
    }
  }
});

attachBtn.onclick = () => fileInput.click();
imageBtn.onclick = () => imageInput.click();

fileInput.onchange = async () => {
  for (const file of fileInput.files) {
    const content = await file.text();
    attachments.push({ type: 'file', name: file.name, content });
  }
  renderAttachments();
  fileInput.value = '';
};

imageInput.onchange = async () => {
  for (const file of imageInput.files) {
    const reader = new FileReader();
    reader.onload = () => {
      attachments.push({ type: 'image', name: file.name, dataUrl: reader.result });
      renderAttachments();
    };
    reader.readAsDataURL(file);
  }
  imageInput.value = '';
};

window.addEventListener('message', (event) => {
  const message = event.data;

  if (message.type === 'token') {
    if (currentBot) {
      if (currentBot.querySelector('.typing')) {
        currentBot.innerHTML = '<div class="author"><span class="author-mark">D</span> DevMind AI</div>';
        const body = document.createElement('div');
        body.innerHTML = '<div class="msg-content"></div>';
        currentBot.appendChild(body);
        currentBot._body = body.querySelector('.msg-content');
      }
      if (currentBot._body) currentBot._body.innerHTML += parseMarkdown(message.text).replace(/<div class="msg-content">|<\/div>/g, '');
      messages.scrollTop = messages.scrollHeight;
    }
  }

  if (message.type === 'done') {
    if (currentBot) {
      if (currentBot.querySelector('.typing')) {
        currentBot.innerHTML = '<div class="author"><span class="author-mark">D</span> DevMind AI</div>';
        const body = document.createElement('div');
        body.innerHTML = parseMarkdown(message.text);
        currentBot.appendChild(body);
      } else if (currentBot._body) {
        currentBot._body.innerHTML = parseMarkdown(message.text);
      }
    }
    currentBot = null;
    sending = false;
    send.disabled = false;
  }

  if (message.type === 'error') {
    if (currentBot) { currentBot.remove(); currentBot = null; }
    addMessage('error', message.text);
    sending = false;
    send.disabled = false;
  }

  if (message.type === 'cleared') addWelcome();

  if (message.type === 'usage') {
    document.getElementById('usage-text').textContent = message.hasApiKey
      ? message.remaining + ' requests left today'
      : 'Not signed in';
    document.getElementById('plan-text').textContent = message.hasApiKey
      ? String(message.plan).toUpperCase() + ' plan'
      : '';
  }

  if (message.type === 'searchResults' && mentionShow) {
    showMentionDropdown(message.results);
  }
});

addWelcome();
vscode.postMessage({ type: 'getUsage' });
</script>
