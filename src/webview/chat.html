<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src https: data: blob: __CSP_SOURCE__; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* NOTE: @import REMOVED — blocked by VS Code webview CSP and causes stylesheet
   parse failure in strict webviews. Font is loaded via JS-injected <link>. */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg0: #0d0e11;
      --bg1: #111318;
      --bg2: #171a21;
      --bg3: #1e2129;
      --bg4: #252933;
      --line: rgba(255, 255, 255, 0.06);
      --line2: rgba(255, 255, 255, 0.10);
      --line3: rgba(255, 255, 255, 0.15);
      --txt: #e4e6ef;
      --txt2: #8f95a8;
      --txt3: #525869;
      --blue: #4d87f6;
      --bdim: rgba(77, 135, 246, 0.12);
      --blue2: #2563eb;
      --green: #2ecc71;
      --gdim: rgba(46, 204, 113, 0.12);
      --amber: #f5a623;
      --adim: rgba(245, 166, 35, 0.12);
      --red: #e05b5b;
      --purple: #9b7ef8;
      --pdim: rgba(155, 126, 248, 0.12);
      --cyan: #22d3ee;
      --font: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Consolas', monospace;
    }

    html,
    body {
      height: 100%
    }

    body {
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      background: var(--bg0);
      color: var(--txt);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      word-wrap: break-word;
      overflow-wrap: break-word
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      height: 40px;
      background: var(--bg1);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0
    }

    .tl {
      display: flex;
      align-items: center;
      gap: 7px
    }

    .logo-mark {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border-radius: 5px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .2), transparent 55%)
    }

    .logo-mark svg {
      width: 11px;
      height: 11px;
      color: #fff;
      position: relative;
      z-index: 1
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -.02em;
      white-space: nowrap
    }

    .model-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg3);
      border: 1px solid var(--line2);
      font-size: 10.5px;
      font-weight: 500;
      color: var(--txt2);
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      transition: all .15s;
      border: none
    }

    .model-pill:hover {
      border-color: var(--blue);
      color: var(--txt)
    }

    .mdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0
    }

    .tr {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0
    }

    .ib {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--txt3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      font-family: var(--font)
    }

    .ib:hover {
      background: var(--bg3);
      color: var(--txt2)
    }

    .ib.on {
      color: var(--blue);
      background: var(--bdim)
    }

    .ib svg {
      width: 13px;
      height: 13px
    }

    .av-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font)
    }

    /* ── SESSIONS POPUP ── */
    .spop {
      position: absolute;
      top: 42px;
      right: 10px;
      width: 240px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--bg2);
      border: 1px solid var(--line2);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .4);
      z-index: 220;
      display: none
    }

    .spop::-webkit-scrollbar {
      width: 3px
    }

    .spop::-webkit-scrollbar-thumb {
      background: var(--bg3)
    }

    .spop-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--txt3);
      font-weight: 700
    }

    .snew {
      border: none;
      background: var(--bdim);
      color: var(--blue);
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font)
    }

    .sitem {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      cursor: pointer
    }

    .sitem:hover,
    .sitem.on {
      background: var(--bg3)
    }

    .stitle {
      font-size: 11px;
      color: var(--txt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .smeta {
      margin-top: 2px;
      font-size: 9px;
      color: var(--txt3);
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .sdel {
      border: none;
      background: none;
      color: var(--txt3);
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font)
    }

    .sdel:hover {
      color: var(--red)
    }

    /* ── CTX BAR ── */
    .ctx-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--bg1);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      overflow-x: auto;
      min-height: 28px
    }

    .ctx-bar::-webkit-scrollbar {
      display: none
    }

    .cpill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg3);
      border: 1px solid var(--line);
      font-size: 10px;
      font-family: var(--mono);
      color: var(--txt2);
      white-space: nowrap;
      flex-shrink: 0
    }

    .cpill .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .cpill.lang .dot {
      background: var(--amber)
    }

    .cpill.fw .dot {
      background: var(--blue)
    }

    .cpill.db .dot {
      background: var(--green)
    }

    .cpill.auth .dot {
      background: var(--purple)
    }

    .cpill.files .dot {
      background: var(--green)
    }

    .cpill.model .dot {
      background: var(--red)
    }

    /* ── MAIN LAYOUT ── */
    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ── FILE PANEL ── */
    .fp {
      width: 200px;
      flex-shrink: 0;
      background: var(--bg1);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .fp.hidden {
      display: none
    }

    .fp-hd {
      padding: 8px 10px 6px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0
    }

    .fp-ttl {
      font-size: 10px;
      font-weight: 700;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .fp-srch {
      margin-top: 5px;
      width: 100%;
      padding: 4px 8px;
      border-radius: 5px;
      background: var(--bg2);
      border: 1px solid var(--line2);
      color: var(--txt);
      font-size: 11px;
      font-family: var(--font);
      outline: none
    }

    .fp-srch::placeholder {
      color: var(--txt3)
    }

    .fp-srch:focus {
      border-color: var(--blue)
    }

    .fp-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0
    }

    .fp-list::-webkit-scrollbar {
      width: 3px
    }

    .fp-list::-webkit-scrollbar-thumb {
      background: var(--bg3);
      border-radius: 2px
    }

    .fpi {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background .1s
    }

    .fpi:hover {
      background: var(--bg2)
    }

    .fpi-ic {
      font-size: 11px;
      flex-shrink: 0;
      opacity: .7
    }

    .fpi-inner {
      flex: 1;
      min-width: 0
    }

    .fpi-name {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--txt2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .fpi-path {
      font-size: 9px;
      color: var(--txt3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .fpi-add {
      padding: 3px 7px;
      border: none;
      background: var(--bdim);
      color: var(--blue);
      font-size: 10px;
      font-family: var(--font);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0
    }

    .fpi-add:hover {
      background: rgba(77, 135, 246, .22)
    }

    .fp-empty {
      padding: 14px 10px;
      font-size: 11px;
      color: var(--txt3);
      text-align: center
    }

    /* ── CHAT COL ── */
    .chat-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden
    }

    .msgs {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0
    }

    .msgs::-webkit-scrollbar {
      width: 3px
    }

    .msgs::-webkit-scrollbar-thumb {
      background: var(--bg4);
      border-radius: 2px
    }

    /* ── WELCOME ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 10px;
      text-align: center;
      width: 100%;
      animation: fu .3s ease-out
    }

    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .wlogo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden
    }

    .wlogo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .2), transparent 55%)
    }

    .wlogo svg {
      width: 20px;
      height: 20px;
      color: #fff;
      position: relative;
      z-index: 1
    }

    .welcome h2 {
      display: block;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.02em;
      margin-bottom: 5px;
      white-space: normal;
      word-wrap: break-word
    }

    .welcome p {
      display: block;
      width: 100%;
      font-size: 11.5px;
      color: var(--txt2);
      line-height: 1.6;
      margin-bottom: 14px;
      white-space: normal;
      word-wrap: break-word;
      font-weight: 300
    }

    .qal {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%
    }

    .qa {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: all .15s;
      text-align: left
    }

    .qa:hover {
      background: var(--bg3);
      border-color: var(--line2);
      transform: translateX(1px)
    }

    .qa-ic {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .qa-ic svg {
      width: 12px;
      height: 12px
    }

    .qa-ic.b {
      background: var(--bdim);
      color: var(--blue)
    }

    .qa-ic.g {
      background: var(--gdim);
      color: var(--green)
    }

    .qa-ic.a {
      background: var(--adim);
      color: var(--amber)
    }

    .qa-ic.p {
      background: var(--pdim);
      color: var(--purple)
    }

    .qa-ic.r {
      background: rgba(224, 91, 91, .1);
      color: var(--red)
    }

    .qa-tx {
      flex: 1;
      min-width: 0
    }

    .qa-t {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .qa-s {
      font-size: 10.5px;
      color: var(--txt3);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 300
    }

    .qa-ar {
      color: var(--txt3);
      font-size: 11px;
      flex-shrink: 0
    }

    .conn-card {
      margin-top: 12px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bdim);
      border: 1px solid rgba(77, 135, 246, .2);
      text-align: left
    }

    .conn-card h4 {
      font-size: 12px;
      font-weight: 600;
      color: #7eb8f9;
      margin-bottom: 3px
    }

    .conn-card p {
      font-size: 11px;
      color: var(--txt2);
      line-height: 1.6;
      margin-bottom: 8px;
      white-space: normal
    }

    .conn-btn {
      padding: 5px 11px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font)
    }

    /* ── MESSAGES ── */
    .mrow {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      animation: mi .18s ease-out
    }

    @keyframes mi {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .mrow.u {
      align-items: flex-end;
      margin: 3px 0
    }

    .mrow.b {
      align-items: flex-start;
      margin: 3px 0
    }

    .ubub {
      max-width: 88%;
      padding: 8px 12px;
      border-radius: 14px 14px 3px 14px;
      background: var(--blue2);
      color: #fff;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      letter-spacing: -.008em
    }

    .brow {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      width: 100%;
      min-width: 0
    }

    .bav {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      position: relative;
      overflow: hidden
    }

    .bav::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 55%)
    }

    .bav svg {
      width: 11px;
      height: 11px;
      color: #fff;
      position: relative;
      z-index: 1
    }

    .bcont {
      flex: 1;
      min-width: 0;
      overflow: hidden
    }

    .blbl {
      font-size: 10px;
      color: var(--txt3);
      margin-bottom: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .bbub {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 3px 10px 10px 10px;
      padding: 9px 11px;
      font-size: 13px;
      line-height: 1.65;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      min-width: 0;
      letter-spacing: -.008em
    }

    /* ── MARKDOWN ── */
    .md {
      display: block;
      width: 100%;
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word
    }

    .md p {
      display: block;
      margin-bottom: 7px;
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.65
    }

    .md p:last-child {
      margin-bottom: 0
    }

    .md h1,
    .md h2 {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 10px 0 4px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 3px
    }

    .md h3 {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 9px 0 3px
    }

    .md ul,
    .md ol {
      padding-left: 15px;
      margin: 5px 0
    }

    .md li {
      margin: 2px 0;
      color: var(--txt2);
      font-size: 12.5px
    }

    .md strong {
      font-weight: 600;
      color: var(--txt)
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 8px 0
    }

    .md code:not(pre code) {
      font-family: var(--mono);
      font-size: 11px;
      padding: 1px 4px;
      border-radius: 3px;
      background: var(--bg3);
      border: 1px solid var(--line2);
      color: var(--cyan);
      word-break: break-all
    }

    .code-wrap {
      margin: 7px 0;
      border-radius: 6px;
      background: var(--bg0);
      border: 1px solid var(--line2);
      overflow: hidden
    }

    .code-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 9px;
      border-bottom: 1px solid var(--line)
    }

    .code-lang {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--blue)
    }

    .code-acts {
      display: flex;
      gap: 3px
    }

    .cbtn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 3px;
      border: none;
      background: var(--bg3);
      color: var(--txt3);
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font);
      transition: color .1s
    }

    .cbtn:hover {
      color: var(--txt)
    }

    .cbtn.ok {
      color: var(--green)
    }

    .cbtn svg {
      width: 9px;
      height: 9px
    }

    .code-wrap pre {
      margin: 0;
      padding: 10px;
      overflow-x: auto
    }

    .code-wrap code {
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      color: var(--txt);
      white-space: pre
    }

    /* ── THINKING ── */
    .tkrow {
      display: flex;
      gap: 7px;
      align-items: flex-start
    }

    .tkbody {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 3px 10px 10px 10px;
      background: var(--bg2);
      border: 1px solid var(--line)
    }

    .dots {
      display: flex;
      gap: 3px
    }

    .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--blue);
      animation: dp 1.4s ease-in-out infinite;
      opacity: .5
    }

    .dots span:nth-child(2) {
      animation-delay: .2s
    }

    .dots span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes dp {

      0%,
      60%,
      100% {
        transform: scale(.8);
        opacity: .4
      }

      30% {
        transform: scale(1.2);
        opacity: 1
      }
    }

    .tklbl {
      font-size: 11.5px;
      color: var(--txt2);
      white-space: nowrap
    }

    .stop-btn {
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid rgba(224, 91, 91, .25);
      background: rgba(224, 91, 91, .07);
      color: var(--red);
      font-size: 10px;
      cursor: pointer;
      font-family: var(--font)
    }

    .stop-btn:hover {
      background: rgba(224, 91, 91, .14)
    }

    /* ── ALERT BUBBLES ── */
    .err-b {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      background: rgba(224, 91, 91, .07);
      border: 1px solid rgba(224, 91, 91, .18);
      color: var(--red);
      font-size: 12px;
      line-height: 1.5;
      word-wrap: break-word
    }

    .warn-b {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      background: rgba(245, 166, 35, .07);
      border: 1px solid rgba(245, 166, 35, .2);
      color: var(--amber);
      font-size: 12px;
      line-height: 1.5;
      word-wrap: break-word
    }

    .info-b {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      background: var(--bdim);
      border: 1px solid rgba(77, 135, 246, .2);
      color: var(--blue);
      font-size: 12px;
      line-height: 1.5;
      word-wrap: break-word
    }

    .err-b svg,
    .warn-b svg,
    .info-b svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      margin-top: 1px
    }

    /* ── DROPDOWNS ── */
    .mdrop {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--line2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 -6px 20px rgba(0, 0, 0, .45);
      z-index: 200;
      max-height: 200px;
      overflow-y: auto
    }

    .mdrop::-webkit-scrollbar {
      width: 3px
    }

    .mdrop::-webkit-scrollbar-thumb {
      background: var(--bg3)
    }

    .sdrop {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--line2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 -6px 20px rgba(0, 0, 0, .45);
      z-index: 200;
      max-height: 220px;
      overflow-y: auto
    }

    .sdrop::-webkit-scrollbar {
      width: 3px
    }

    .sdrop::-webkit-scrollbar-thumb {
      background: var(--bg3)
    }

    .drop-hdr {
      padding: 5px 10px;
      font-size: 9px;
      font-weight: 700;
      color: var(--txt3);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 5px
    }

    .mitem {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      transition: background .1s
    }

    .mitem:hover,
    .mitem.on {
      background: var(--bg3)
    }

    .mi-ic {
      font-size: 12px;
      flex-shrink: 0;
      opacity: .65
    }

    .mi-nm {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--txt);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .mi-pt {
      font-size: 9px;
      color: var(--txt3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .mi-in {
      flex: 1;
      min-width: 0
    }

    .sitem2 {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      cursor: pointer;
      transition: background .1s
    }

    .sitem2:hover,
    .sitem2.on {
      background: var(--bg3)
    }

    .scmd {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--blue);
      min-width: 100px;
      font-weight: 500
    }

    .sdesc {
      font-size: 11px;
      color: var(--txt2);
      flex: 1
    }

    .skbd {
      margin-left: auto;
      font-size: 9px;
      color: var(--txt3);
      font-family: var(--mono);

    /* ── COMPOSER ── */
    .composer {

      padding: 6px 10px 8px;
      flex-shrink: 0;

    }

      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 5px
    }

    .attstrip:empty {
      display: none
    }

    .achip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg3);
      border: 1px solid var(--line);
      font-size: 10px;
      font-family: var(--mono);
      color: var(--txt2);

    }

    .achip.men {
      border-color: rgba(77, 135, 246, .4);
      background: var(--bdim);
      color: var(--blue)
    }

    .achip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .achip button {
      background: none;
      border: none;
      color: var(--txt3);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      line-height: 1
    }

    .achip button:hover {
      color: var(--red)
    }

    .cbox {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 9px;
      background: var(--bg2);
      border: 1px solid var(--line2);
      transition: border-color .15s
    }

    .cbox:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(77, 135, 246, .1)
    }

    .cbtn2 {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--txt3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;

      flex-shrink: 0;
      font-family: var(--font)
    }

    .cbtn2:hover {
      background: var(--bg3);
      color: var(--txt2)
    }

    .cbtn2 svg {
      width: 13px;
      height: 13px
    }

    .cinput {
      flex: 1;
      min-width: 0;
      min-height: 20px;
      max-height: 100px;
      padding: 2px 0;
      border: none;
      background: transparent;
      color: var(--txt);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: -.008em;

    }

    }

    .csend {

    }

    .cfoot {

      padding: 0 1px
    }

    .cfl {

    }

    }

    }

      padding: 0 5px;
      font-family: var(--font);
      outline: none;
      cursor: pointer
    }

    #file-input {
      display: none
    }
  </style>
</head>

<body>

  <script>
    function hardFail(message) {
      try {
        document.body.innerHTML = '<div style="font-family:Segoe UI,sans-serif;padding:14px;color:#e2e8f0;background:#0d1117;line-height:1.6">'
          + '<h3 style="margin:0 0 8px 0">DevMind webview error</h3>'
          + '<p style="margin:0 0 8px 0">The chat UI crashed during startup.</p>'
          + '<pre style="white-space:pre-wrap;background:#171a21;border:1px solid rgba(255,255,255,.1);padding:8px;border-radius:6px;">'
          + String(message || 'Unknown error').replace(/[<>&]/g, '')
          + '</pre>'
          + '<p style="margin:8px 0 0 0">Reload VS Code window and reopen DevMind chat.</p>'
          + '</div>';
      } catch {}
    }
    window.addEventListener('error', function (e) { hardFail(e && e.message ? e.message : 'Script error'); });
    window.addEventListener('unhandledrejection', function (e) { hardFail(e && e.reason ? e.reason : 'Unhandled promise rejection'); });
    console.log('[DevMind] Starting webview...');
    
    /* ═══════════════════════════════════════════════════════════
       FIX #1 — Font loaded via <link> not @import (CSP safe)
       ═══════════════════════════════════════════════════════════ */
    try {
    (function () {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap';
      document.head.appendChild(l);
      console.log('[DevMind] Font link added');
    })();
    } catch(e) { console.error('[DevMind] Font error:', e); }

    /* ═══════════════════════════════════════════════════════════
       FIX #2 — Correct boolean after template substitution
       ('__HAS_API_KEY__'==='true') ALWAYS returns false before
       substitution because it compares the literal string.
       After substitution it becomes (true === 'true') which is
       also false (strict equality). Correct form: just use the
       substituted value directly as a boolean expression.
       ═══════════════════════════════════════════════════════════ */
    var HAS_API_KEY = __HAS_API_KEY__ === 'true';

    var vscode = (typeof acquireVsCodeApi !== 'undefined')
      ? acquireVsCodeApi()
      : { postMessage: function (m) { console.log('[mock]', m); } };

    /* DOM */
    var msgsEl = document.getElementById('msgs'),
      inp = document.getElementById('inp'),
      sendBtn = document.getElementById('send'),
      fi = document.getElementById('file-input'),
      attstrip = document.getElementById('attstrip'),
      ulbl = document.getElementById('ulbl'),
      sdrop = document.getElementById('sdrop'),
      mdrop = document.getElementById('mdrop'),
      fpEl = document.getElementById('fp'),
      fpSrch = document.getElementById('fp-srch'),
      fpList = document.getElementById('fp-list'),
      fpCnt = document.getElementById('fp-cnt'),
      spop = document.getElementById('spop'),
      slist = document.getElementById('slist'),
      isel = document.getElementById('isel');

    var sending = false, curBot = null, rawBuf = '';
    var atts = [], mentions = [];
    var dropMode = '', slashIdx = -1, mIdx = -1;
    var allFiles = [], sessions = [], activeSid = '';
    var fpOpen = false, histDone = false;

    /* ═══ HELPERS ═══ */
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }
    function ar() { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 100) + 'px'; }
    function icon(e) { var m = { ts: '🔷', tsx: '🔷', js: '🟡', jsx: '🟡', py: '🐍', go: '🐹', rs: '🦀', java: '☕', json: '📋', md: '📝', css: '🎨', html: '🌐', yaml: '⚙️', yml: '⚙️', sh: '📜', env: '🔑', sql: '🗃️' }; return m[e] || '📄'; }

    /* FIX #7 — Bot avatar always SVG, never <img __LOGO_URI__> */
    var BAV = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="11" height="11" style="position:relative;z-index:1"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>';

    /* ═══ SLASH DROP ═══ */
    var CMDS = [
      { c: '/explain', d: 'Explain selected code', k: 'Ctrl+Shift+E' },
      { c: '/explainfile', d: 'Explain the entire open file', k: '' },
      { c: '/fix', d: 'Fix bugs in selection', k: 'Ctrl+Shift+F' },
      { c: '/refactor', d: 'Refactor selected code', k: '' },
      { c: '/test', d: 'Generate unit tests', k: 'Ctrl+Shift+T' },
      { c: '/generate', d: 'Generate code from description', k: 'Ctrl+Shift+G' },
      { c: '/scaffold', d: 'Scaffold auth, CRUD, API…', k: 'Ctrl+Shift+S' },
      { c: '/plan', d: 'Create implementation plan', k: '' },
      { c: '/optimize', d: 'Optimize for performance', k: '' },
      { c: '/secure', d: 'Audit for security issues', k: '' },
      { c: '/autoheal', d: 'Fix + verify + retry automatically', k: '' },
      { c: '/pr', d: 'Generate PR-ready summary/checklist', k: '' },
      { c: '/implement-plan', d: 'Execute hybrid multi-step implementation', k: '' },
      { c: '/tree', d: 'Refresh file tree', k: '' },
      { c: '/clear', d: 'Clear chat history', k: '' },
    ];

    function showSlash(f) {
      var cs = CMDS.filter(function (x) { return !f || x.c.slice(1).toLowerCase().startsWith(f.toLowerCase()); });
      if (!cs.length) { hideDrop(); return; }
      dropMode = 'slash'; slashIdx = -1;
      var h = '<div class="drop-hdr">Commands</div>';
      cs.forEach(function (x) { h += '<div class="sitem2" data-cmd="' + esc(x.c) + '"><span class="scmd">' + esc(x.c) + '</span><span class="sdesc">' + esc(x.d) + '</span>' + (x.k ? '<span class="skbd">' + esc(x.k) + '</span>' : '') + '</div>'; });
      sdrop.innerHTML = h;
      sdrop.querySelectorAll('.sitem2').forEach(function (el) { el.addEventListener('mousedown', function (e) { e.preventDefault(); pickSlash(el.dataset.cmd); }); });
      sdrop.style.display = 'block'; mdrop.style.display = 'none';
    }
    function pickSlash(cmd) { inp.value = cmd + ' '; ar(); hideDrop(); inp.focus(); }

    /* ═══ MENTION DROP ═══ */
    /* FIX #6 — debounce + space guard */
    var mTimer = null;
    function reqMention(q) {
      clearTimeout(mTimer);
      mTimer = setTimeout(function () { dropMode = 'mention'; vscode.postMessage({ type: 'searchFiles', query: q }); }, 120);
    }
    function showMentions(res) {
      if (!res || !res.length) { hideDrop(); return; }
      mIdx = -1;
      var h = '<div class="drop-hdr"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg> Files</div>';
      res.forEach(function (f) { h += '<div class="mitem" data-path="' + esc(f.path) + '" data-name="' + esc(f.name) + '"><span class="mi-ic">' + icon((f.name || '').split('.').pop() || '') + '</span><div class="mi-in"><div class="mi-nm">' + esc(f.name) + '</div><div class="mi-pt">' + esc(f.path) + '</div></div></div>'; });
      mdrop.innerHTML = h;
      mdrop.querySelectorAll('.mitem').forEach(function (el) { el.addEventListener('mousedown', function (e) { e.preventDefault(); pickMention(el.dataset.path, el.dataset.name); }); });
      mdrop.style.display = 'block'; sdrop.style.display = 'none';
    }
    function pickMention(fp, fn) {
      var val = inp.value, cur = inp.selectionStart, bef = val.slice(0, cur), ai = bef.lastIndexOf('@');
      if (ai >= 0) { var tok = fp || fn; inp.value = bef.slice(0, ai) + '@' + tok + ' ' + val.slice(cur); var np = ai + tok.length + 2; inp.setSelectionRange(np, np); }
      if (!mentions.find(function (m) { return m.path === fp; })) { mentions.push({ path: fp, name: fn }); renderAtts(); }
      hideDrop(); inp.focus(); ar();
    }
    function navDrop(d) {
      if (dropMode === 'slash') { var els = sdrop.querySelectorAll('.sitem2'); if (!els.length) return; els.forEach(function (e) { e.classList.remove('on'); }); slashIdx = (slashIdx + d + els.length) % els.length; els[slashIdx].classList.add('on'); els[slashIdx].scrollIntoView({ block: 'nearest' }); }
      else if (dropMode === 'mention') { var mel = mdrop.querySelectorAll('.mitem'); if (!mel.length) return; mel.forEach(function (e) { e.classList.remove('on'); }); mIdx = (mIdx + d + mel.length) % mel.length; mel[mIdx].classList.add('on'); mel[mIdx].scrollIntoView({ block: 'nearest' }); }
    }
    function confDrop() {
      if (dropMode === 'slash') { var a = sdrop.querySelector('.sitem2.on') || sdrop.querySelector('.sitem2'); if (a) { pickSlash(a.dataset.cmd); return true; } }
      else if (dropMode === 'mention') { var ma = mdrop.querySelector('.mitem.on') || mdrop.querySelector('.mitem'); if (ma) { pickMention(ma.dataset.path, ma.dataset.name); return true; } }
      return false;
    }
    function hideDrop() { sdrop.style.display = 'none'; mdrop.style.display = 'none'; dropMode = ''; slashIdx = -1; mIdx = -1; }

    /* ═══ SESSIONS ═══ */
    function renderSessions() {
      if (!sessions.length) { slist.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--txt3);text-align:center">No chats yet</div>'; return; }
      var h = '';
      sessions.forEach(function (s) {
        var tm = new Date(s.updatedAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        h += '<div class="sitem' + (s.id === activeSid ? ' on' : '') + '" data-id="' + esc(s.id) + '">'
          + '<div class="stitle">' + esc(s.title || 'New chat') + '</div>'
          + '<div class="smeta"><span>' + (s.messageCount || 0) + ' msgs · ' + tm + '</span>'
          + '<button class="sdel" data-del="' + esc(s.id) + '">Delete</button></div></div>';
      });
      slist.innerHTML = h;
      /* FIX #8 — stop delete click from bubbling to switch */
      slist.querySelectorAll('.sdel').forEach(function (b) { b.addEventListener('click', function (e) { e.stopPropagation(); vscode.postMessage({ type: 'deleteSession', id: b.dataset.del }); }); });
      slist.querySelectorAll('.sitem').forEach(function (el) { el.addEventListener('click', function () { vscode.postMessage({ type: 'switchSession', id: el.dataset.id }); spop.style.display = 'none'; document.getElementById('btn-sessions').classList.remove('on'); }); });
    }

    /* ═══ FILE PANEL ═══ */
    function togFP() {
      fpOpen = !fpOpen;
      if (fpOpen) { fpEl.classList.remove('hidden'); document.getElementById('btn-files').classList.add('on'); }
      else { fpEl.classList.add('hidden'); document.getElementById('btn-files').classList.remove('on'); }
    }
    function renderFL(files, q) {
      if (!files || !files.length) { fpList.innerHTML = '<div class="fp-empty">' + (q ? 'No matches' : 'No files indexed') + '</div>'; return; }
      var h = '';
      files.slice(0, 120).forEach(function (f) { h += '<div class="fpi" data-path="' + esc(f.path) + '" data-name="' + esc(f.name) + '"><span class="fpi-ic">' + icon((f.name || '').split('.').pop() || '') + '</span><div class="fpi-inner"><div class="fpi-name">' + esc(f.name) + '</div><div class="fpi-path">' + esc(f.path) + '</div></div><button class="fpi-add">@</button></div>'; });
      fpList.innerHTML = h;
      fpList.querySelectorAll('.fpi').forEach(function (el) {
        var ab = el.querySelector('.fpi-add');
        ab && ab.addEventListener('click', function (e) { e.stopPropagation(); pickMention(el.dataset.path, el.dataset.name); });
        el.addEventListener('click', function (e) { if (e.target === ab) return; vscode.postMessage({ type: 'openFile', path: el.dataset.path }); });
      });
    }

    /* ═══ MARKDOWN ═══ */
    function md(raw) {
      if (!raw) return '';
      var blocks = [];
      var t = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, function (_, lang, code) {
        var l = esc(lang || 'code'), c = esc(code.trim()), i = blocks.length;
        blocks.push('<div class="code-wrap"><div class="code-head"><span class="code-lang">' + l + '</span><div class="code-acts"><button class="cbtn" onclick="doCopy(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button><button class="cbtn" onclick="doIns(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Insert</button></div></div><pre><code>' + c + '</code></pre></div>');
        return '\x00B' + i + '\x00';
      });
      t = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>').replace(/^## (.+)$/gm, '<h2>$1</h2>').replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^---$/gm, '<hr>').replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[^\0]*?<\/li>)/g, function (m) { return '<ul>' + m + '</ul>'; });
      t = t.replace(/\x00B(\d+)\x00/g, function (_, i) { return blocks[parseInt(i)]; });
      return t.split(/\n{2,}/).map(function (p) { return /^<[houdp]|<div|<pre|<hr/.test(p.trim()) ? p : '<p>' + p.replace(/\n/g, '<br>') + '</p>'; }).join('');
    }

    /* ═══ WELCOME ═══ */
    function showWelcome() {
      msgsEl.innerHTML = ''; rawBuf = ''; curBot = null;
      var items = [
        { c: 'b', t: 'Explain file', s: 'Understand current file structure', p: 'Explain what the current file does, key functions, and architecture', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' },
        { c: 'g', t: 'Write tests', s: 'Generate comprehensive test coverage', p: 'Write comprehensive unit tests for the selected code', icon: '<polyline points="20 6 9 17 4 12"/>' },
        { c: 'a', t: 'Find bugs', s: 'Review code for issues', p: 'Review this code and find all potential bugs and security issues', icon: '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>' },
        { c: 'p', t: 'Refactor code', s: 'Improve quality and performance', p: 'Refactor the selected code for clarity, performance, and best practices', icon: '<path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>' },
        { c: 'r', t: 'Scaffold module', s: 'Create auth, CRUD, API in seconds', p: '/scaffold', icon: '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17.5h7M17.5 14v7"/>' },
      ];
      var div = document.createElement('div'); div.className = 'welcome';
      var h = '<div class="wlogo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="20" height="20" style="position:relative;z-index:1"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>'
        + '<h2>DevMind AI</h2><p>@ files from your codebase · / for commands · or just ask</p><div class="qal">';
      items.forEach(function (it) { h += '<div class="qa" data-p="' + esc(it.p) + '"><div class="qa-ic ' + it.c + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + it.icon + '</svg></div><div class="qa-tx"><div class="qa-t">' + esc(it.t) + '</div><div class="qa-s">' + esc(it.s) + '</div></div><span class="qa-ar">›</span></div>'; });
      h += '</div>';
      if (!HAS_API_KEY) h += '<div class="conn-card"><h4>Connect your account</h4><p>Sign up at the DevMind dashboard, verify with Gmail OTP, then paste your API key via DevMind: Set API Key.</p><button class="conn-btn" onclick="vscode.postMessage({type:\'openOnboarding\'})">Open dashboard</button></div>';
      div.innerHTML = h;
      div.querySelectorAll('.qa').forEach(function (el) { el.addEventListener('click', function () { var p = el.dataset.p; if (p.startsWith('/')) vscode.postMessage({ type: 'slash', command: p.slice(1), args: '' }); else { inp.value = p; inp.focus(); ar(); } }); });
      msgsEl.appendChild(div);
    }

    /* ═══ MSG HELPERS ═══ */
    function addUser(text) { var r = document.createElement('div'); r.className = 'mrow u'; var b = document.createElement('div'); b.className = 'ubub'; b.textContent = text; r.appendChild(b); msgsEl.appendChild(r); scroll(); }
    function mkBot() { var r = document.createElement('div'); r.className = 'mrow b'; r.innerHTML = '<div class="brow"><div class="bav">' + BAV + '</div><div class="bcont"><div class="blbl">DevMind</div><div class="bbub"><div class="md"></div></div></div></div>'; return r; }

    /* FIX #5 — guard prevents blank screen on empty history */
    function renderHist(msgs) {
      if (!msgs || !msgs.length) { if (!histDone) showWelcome(); return; }
      histDone = true; msgsEl.innerHTML = ''; rawBuf = ''; curBot = null;
      msgs.forEach(function (m) {
        if (!m || !m.role || !m.content) return;
        if (m.role === 'user') { var t = m.content, qi = t.indexOf('[QUESTION]\n'); if (qi >= 0) t = t.slice(qi + 11).trim(); addUser(t); }
        else { var r = mkBot(); msgsEl.appendChild(r); var el = r.querySelector('.md'); if (el) el.innerHTML = md(m.content); }
      });
      scroll();
    }

    function showThink() {
      remThink();
      var r = document.createElement('div'); r.className = 'mrow b'; r.id = 'think';
      r.innerHTML = '<div class="tkrow"><div class="bav">' + BAV + '</div><div class="tkbody"><div class="dots"><span></span><span></span><span></span></div><span class="tklbl">Thinking…</span><button class="stop-btn" onclick="stopGen()">Stop</button></div></div>';
      msgsEl.appendChild(r); scroll();
    }
    function remThink() { var t = document.getElementById('think'); if (t) t.remove(); }

    function addAlert(cls, text) {
      var r = document.createElement('div'); r.className = 'mrow b';
      r.innerHTML = '<div class="' + cls + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>' + esc(text) + '</span></div>';
      msgsEl.appendChild(r); scroll();
    }

    /* ═══ SEND ═══ */
    function send() {
      var text = inp.value.trim(); if (!text || sending) return;
      if (text.startsWith('/')) {
        var pts = text.slice(1).split(' '), cmd = pts[0].toLowerCase(), args = pts.slice(1).join(' ');
        inp.value = ''; ar(); hideDrop();
        if (cmd === 'clear') { vscode.postMessage({ type: 'clear' }); return; }
        vscode.postMessage({ type: 'slash', command: cmd, args: args }); return;
      }
      msgsEl.querySelector('.welcome') && msgsEl.querySelector('.welcome').remove();
      histDone = true; addUser(text);
      inp.value = ''; ar(); hideDrop();
      sending = true; sendBtn.disabled = true; curBot = null; rawBuf = '';
      showThink();
      vscode.postMessage({ type: 'chat', text: text, attachments: atts.slice(), mentionedFiles: mentions.slice() });
      atts = []; mentions = []; renderAtts();
    }

    window.stopGen = function () { vscode.postMessage({ type: 'stopGeneration' }); remThink(); if (curBot) { curBot.remove(); curBot = null; } rawBuf = ''; sending = false; sendBtn.disabled = false; };
    window.doCopy = function (btn) { var c = btn.closest('.code-wrap').querySelector('code').textContent; navigator.clipboard.writeText(c).then(function () { btn.classList.add('ok'); var o = btn.innerHTML; btn.textContent = '✓ Copied'; setTimeout(function () { btn.classList.remove('ok'); btn.innerHTML = o; }, 2000); }); };
    window.doIns = function (btn) { var c = btn.closest('.code-wrap').querySelector('code').textContent; vscode.postMessage({ type: 'insertCode', code: c }); btn.classList.add('ok'); var o = btn.innerHTML; btn.textContent = '✓ Sent'; setTimeout(function () { btn.innerHTML = o; btn.classList.remove('ok'); }, 2000); };

    /* ═══ ATTACHMENTS ═══ */
    function renderAtts() {
      if (!atts.length && !mentions.length) { attstrip.innerHTML = ''; return; }
      var h = '';
      atts.forEach(function (a, i) { h += '<div class="achip"><span>📎 ' + esc(a.name) + '</span><button onclick="remAtt(' + i + ')">×</button></div>'; });
      mentions.forEach(function (m, i) { h += '<div class="achip men"><span>@ ' + esc(m.name) + '</span><button onclick="remMen(' + i + ')">×</button></div>'; });
      attstrip.innerHTML = h;
    }
    window.remAtt = function (i) { atts.splice(i, 1); renderAtts(); };
    window.remMen = function (i) { mentions.splice(i, 1); renderAtts(); };
    fi && fi.addEventListener('change', function () {
      Promise.all(Array.from(fi.files).map(function (f) { return f.text().then(function (c) { atts.push({ type: 'file', name: f.name, content: c }); }).catch(function () { }); })).then(renderAtts);
      fi.value = '';
    });

    /* ═══ INPUT ═══ */
    inp.addEventListener('input', function () {
      ar();
      var val = inp.value, cur = inp.selectionStart;
      if (val === '/') { showSlash(''); return; }
      if (val.startsWith('/') && !val.includes(' ')) { showSlash(val.slice(1)); return; }
      /* FIX #6 — only trigger mention when no space after @ */
      var bef = val.slice(0, cur), ai = bef.lastIndexOf('@');
      if (ai >= 0) { var q = bef.slice(ai + 1); if (!q.includes(' ')) { reqMention(q); return; } }
      hideDrop();
    });
    inp.addEventListener('keydown', function (e) {
      if (dropMode) {
        if (e.key === 'ArrowDown') { e.preventDefault(); navDrop(1); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); navDrop(-1); return; }
        if (e.key === 'Tab' || e.key === 'Enter') { if (confDrop()) { e.preventDefault(); return; } }
        if (e.key === 'Escape') { hideDrop(); return; }
      }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    document.addEventListener('click', function (e) {
      var bs = document.getElementById('btn-sessions');
      if (!sdrop.contains(e.target) && !mdrop.contains(e.target) && e.target !== inp) hideDrop();
      if (bs && !spop.contains(e.target) && e.target !== bs) { spop.style.display = 'none'; bs.classList.remove('on'); }
    });
    fpSrch && fpSrch.addEventListener('input', function () {
      var q = fpSrch.value.trim();
      renderFL(q ? allFiles.filter(function (f) { return f.name.toLowerCase().includes(q.toLowerCase()) || f.path.toLowerCase().includes(q.toLowerCase()); }) : allFiles, q);
    });

    /* ═══ BUTTONS ═══ */
    sendBtn.addEventListener('click', send);
    document.getElementById('btn-new').addEventListener('click', function () { vscode.postMessage({ type: 'newSession' }); });
    document.getElementById('btn-sessions').addEventListener('click', function () { var v = spop.style.display === 'block'; spop.style.display = v ? 'none' : 'block'; this.classList.toggle('on', !v); if (!v) vscode.postMessage({ type: 'getSessions' }); });
    document.getElementById('btn-settings').addEventListener('click', function () { vscode.postMessage({ type: 'openOnboarding' }); });
    document.getElementById('btn-scaffold').addEventListener('click', function () { vscode.postMessage({ type: 'scaffold' }); });
    document.getElementById('btn-att').addEventListener('click', function () { fi && fi.click(); });
    document.getElementById('btn-files').addEventListener('click', function () { togFP(); vscode.postMessage({ type: 'getFileTree' }); });
    document.getElementById('snew').addEventListener('click', function () { vscode.postMessage({ type: 'newSession' }); });
    isel && isel.addEventListener('change', function () { vscode.postMessage({ type: 'setIntent', intent: isel.value }); });

    /* ═══ VSCODE MESSAGES ═══ */
    window.addEventListener('message', function (e) {
      var m = e.data; if (!m || !m.type) return;
      if (m.type === 'thinking') { if (m.show) showThink(); else remThink(); return; }
      if (m.type === 'token') {
        if (!m.text) return; remThink();
        if (!curBot) { curBot = mkBot(); msgsEl.appendChild(curBot); }
        rawBuf += m.text; var el = curBot.querySelector('.md');
        if (el) { el.innerHTML = md(rawBuf); scroll(); } return;
      }
      if (m.type === 'done') {
        remThink(); var fin = m.text || rawBuf;
        if (curBot) { var e2 = curBot.querySelector('.md'); if (e2) e2.innerHTML = md(fin); }
        else if (fin) { var r = mkBot(); msgsEl.appendChild(r); var e3 = r.querySelector('.md'); if (e3) e3.innerHTML = md(fin); }
        curBot = null; rawBuf = ''; sending = false; sendBtn.disabled = false; scroll(); return;
      }
      if (m.type === 'error') { remThink(); if (curBot) { curBot.remove(); curBot = null; } rawBuf = ''; addAlert('err-b', m.text || 'An error occurred.'); sending = false; sendBtn.disabled = false; return; }
      if (m.type === 'warning') { addAlert('warn-b', m.text || ''); return; }
      if (m.type === 'info') { addAlert('info-b', m.text || ''); return; }
      if (m.type === 'cleared') { showWelcome(); histDone = false; return; }
      /* FIX #5 */
      if (m.type === 'history') { renderHist(m.messages || []); return; }
      if (m.type === 'sessions') { sessions = m.sessions || []; activeSid = m.activeId || ''; renderSessions(); return; }
      if (m.type === 'chatSettings') { if (m.intent && isel) isel.value = m.intent; return; }
      /* FIX #6: accept both message type names providers may send */
      if (m.type === 'searchResults' || m.type === 'fileSearchResults') { if (dropMode === 'mention' || !dropMode) showMentions(m.results || []); return; }
      if (m.type === 'fileTree') { allFiles = m.files || []; fpCnt.textContent = allFiles.length; document.getElementById('ctx-fc').textContent = allFiles.length + ' files'; if (fpOpen) renderFL(allFiles, fpSrch.value.trim()); return; }
      if (m.type === 'usage') {
        HAS_API_KEY = !!m.hasApiKey;
        ulbl.textContent = m.hasApiKey ? (m.remaining + ' left · ' + (m.plan || 'free').toUpperCase()) : 'Not connected';
        if (m.language) document.getElementById('ctx-lang').textContent = m.language.toUpperCase().slice(0, 4);
        if (m.framework && m.framework !== 'Node.js') { document.getElementById('ctx-fw').textContent = m.framework; document.getElementById('ctx-fw-p').style.display = ''; }
        if (m.database && m.database !== 'none') { document.getElementById('ctx-db').textContent = m.database; document.getElementById('ctx-db-p').style.display = ''; }
        if (m.authSystem && m.authSystem !== 'none') { document.getElementById('ctx-au').textContent = m.authSystem; document.getElementById('ctx-au-p').style.display = ''; }
        if (m.fileCount !== undefined) { document.getElementById('ctx-fc').textContent = m.fileCount + ' files'; fpCnt.textContent = m.fileCount; }
        return;
      }
      /* FIX #4: init bundle from extension */
      if (m.type === 'init') {
        initDone = true;
        if (m.usage) window.dispatchEvent(new MessageEvent('message', { data: Object.assign({ type: 'usage' }, m.usage) }));
        if (m.sessions) window.dispatchEvent(new MessageEvent('message', { data: Object.assign({ type: 'sessions' }, m.sessions) }));
        if (m.history) window.dispatchEvent(new MessageEvent('message', { data: { type: 'history', messages: m.history } }));
        setTimeout(function () { vscode.postMessage({ type: 'getFileTree' }); }, 400);
        return;
      }
    });

    /* ═══ FIX #4 — INIT WITH READY HANDSHAKE ═══
       OLD: 4 postMessage() calls fired immediately, before extension
       provider was ready → messages silently dropped → UI stuck on
       "Indexing workspace…" with no data.
    
       NEW: show welcome immediately (no blank screen), send 'ready',
       then stagger the data requests. File tree is delayed 600ms since
       it's expensive and not needed for first paint.
    */
    var initDone = false;
    function doInit() {
      if (initDone) return; initDone = true;
      vscode.postMessage({ type: 'getUsage' });
      vscode.postMessage({ type: 'getSessions' });
      vscode.postMessage({ type: 'getChatSettings' });
      setTimeout(function () { vscode.postMessage({ type: 'getFileTree' }); }, 600);
    }

    showWelcome();                    /* immediate — never blank */
    vscode.postMessage({ type: 'ready' });
    setTimeout(doInit, 300);           /* fallback if extension ignores 'ready' */
  </script>
</body>

</html>
