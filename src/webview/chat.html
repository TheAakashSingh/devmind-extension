<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data: blob: __CSP_SOURCE__; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline';" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #0e0f11;
  --bg1: #13151a;
  --bg2: #1a1d24;
  --bg3: #21252f;
  --line: rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.12);
  --txt: #e8eaf0;
  --txt2: #8b909e;
  --txt3: #555b6a;
  --blue: #4f8ef7;
  --blue2: #2563eb;
  --green: #34d399;
  --amber: #fbbf24;
  --red: #f87171;
  --purple: #a78bfa;
  --radius: 10px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'DM Mono', 'Consolas', monospace;
}

html { height: 100%; }
body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg0);
  color: var(--txt);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  /* CRITICAL: ensure text never collapses to single words */
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  height: 42px;
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 7px; min-width: 0; }
.brand-mark {
  width: 24px; height: 24px; flex-shrink: 0;
  border-radius: 6px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
}
.brand-mark svg { width: 13px; height: 13px; color: #fff; }
.brand-name { font-size: 13px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; }

.topbar-center { display: flex; align-items: center; gap: 5px; }
.model-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--line2);
  font-size: 11px; font-weight: 500;
  color: var(--txt2);
  cursor: pointer;
  font-family: var(--font);
  white-space: nowrap;
}
.model-pill:hover { border-color: var(--blue); color: var(--txt); }
.model-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

.topbar-right { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.icon-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none; background: transparent;
  color: var(--txt3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: var(--font);
}
.icon-btn:hover { background: var(--bg3); color: var(--txt2); }
.icon-btn svg { width: 14px; height: 14px; }
.avatar-btn {
  width: 24px; height: 24px;
  border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff; font-size: 10px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font);
}

/* ── CONTEXT BAR ── */
.ctx-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  overflow-x: auto;
  min-height: 34px;
}
.ctx-bar::-webkit-scrollbar { display: none; }
.ctx-label { font-size: 10px; color: var(--txt3); flex-shrink: 0; white-space: nowrap; }
.ctx-file {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg3); border: 1px solid var(--line);
  font-size: 10px; font-family: var(--mono);
  color: var(--txt2); white-space: nowrap;
  cursor: pointer; flex-shrink: 0;
}
.ctx-file:hover { border-color: var(--blue); color: var(--txt); }
.ctx-file .ext { color: var(--blue); }
.ctx-add {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px dashed var(--line2);
  background: transparent; color: var(--txt3);
  font-size: 10px; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; font-family: var(--font);
}
.ctx-add:hover { border-color: var(--blue); color: var(--blue); }

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ── WELCOME — THE FIX IS HERE ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 12px;
  text-align: center;
  animation: fadeUp 0.35s ease-out;
  min-width: 0;
  width: 100%;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.welcome-logo {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.welcome-logo svg { width: 22px; height: 22px; color: #fff; }
/* THE CRITICAL FIX: explicit display:block + white-space:normal */
.welcome h2 {
  display: block;
  width: 100%;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  white-space: normal;
  word-wrap: break-word;
  overflow-wrap: break-word;
  line-height: 1.4;
}
.welcome p {
  display: block;
  width: 100%;
  font-size: 12px;
  color: var(--txt2);
  line-height: 1.6;
  margin-bottom: 20px;
  white-space: normal;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.quick-actions {
  display: flex;
  flex-direction: column;
  gap: 5px;
  width: 100%;
}
.qa-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  border-radius: 8px;
  background: var(--bg2);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  min-width: 0;
}
.qa-item:hover { background: var(--bg3); border-color: var(--line2); transform: translateX(2px); }
.qa-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qa-icon svg { width: 12px; height: 12px; }
.qa-icon.blue   { background: rgba(79,142,247,0.15); color: var(--blue); }
.qa-icon.green  { background: rgba(52,211,153,0.15); color: var(--green); }
.qa-icon.amber  { background: rgba(251,191,36,0.15); color: var(--amber); }
.qa-icon.purple { background: rgba(167,139,250,0.15); color: var(--purple); }
.qa-text { flex: 1; min-width: 0; overflow: hidden; }
.qa-title {
  font-size: 12px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qa-sub {
  font-size: 10.5px; color: var(--txt3); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qa-arrow { color: var(--txt3); font-size: 12px; flex-shrink: 0; }

/* ── MESSAGE ROWS ── */
.msg-row {
  display: flex;
  flex-direction: column;
  min-width: 0;
  width: 100%;
  animation: msgIn 0.2s ease-out;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.user  { align-items: flex-end; margin: 5px 0; }
.msg-row.bot   { align-items: flex-start; margin: 5px 0; }

.user-bubble {
  max-width: 85%;
  padding: 9px 13px;
  border-radius: 14px 14px 3px 14px;
  background: var(--blue2);
  color: #fff;
  font-size: 13px;
  line-height: 1.55;
  /* CRITICAL: text wrap */
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.bot-row { display: flex; gap: 8px; align-items: flex-start; width: 100%; min-width: 0; }
.bot-avatar {
  width: 24px; height: 24px;
  border-radius: 7px; background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.bot-avatar svg { width: 12px; height: 12px; color: #fff; }
.bot-content { flex: 1; min-width: 0; overflow: hidden; }
.bot-label {
  font-size: 10px; color: var(--txt3); margin-bottom: 4px;
  font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
}
.bot-bubble {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 3px 12px 12px 12px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.65;
  min-width: 0;
  overflow: hidden;
  /* CRITICAL: text wrap */
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

/* ── MARKDOWN ── */
.md {
  display: block;
  width: 100%;
  min-width: 0;
  /* CRITICAL: text wrap */
  white-space: normal;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.md p {
  display: block; margin-bottom: 9px;
  white-space: normal; word-wrap: break-word;
}
.md p:last-child { margin-bottom: 0; }
.md h1, .md h2, .md h3 {
  display: block; font-size: 13px; font-weight: 600;
  margin: 12px 0 5px; white-space: normal;
}
.md ul, .md ol { padding-left: 16px; margin: 6px 0; }
.md li { margin: 2px 0; color: var(--txt2); font-size: 12.5px; white-space: normal; }
.md code:not(pre code) {
  font-family: var(--mono); font-size: 11px;
  padding: 1px 5px; border-radius: 3px;
  background: var(--bg3); border: 1px solid var(--line2);
  color: var(--blue);
  word-break: break-all;
}
.md strong { font-weight: 600; color: var(--txt); }

/* ── CODE BLOCK ── */
.code-wrap {
  margin: 8px 0;
  border-radius: 7px;
  background: var(--bg0);
  border: 1px solid var(--line2);
  overflow: hidden;
}
.code-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 10px;
  border-bottom: 1px solid var(--line);
}
.code-lang {
  font-family: var(--mono); font-size: 9px;
  font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--blue);
}
.code-actions-row { display: flex; gap: 3px; }
.code-btn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 3px; border: none;
  background: var(--bg3); color: var(--txt3);
  font-size: 10px; cursor: pointer; font-family: var(--font);
  transition: all 0.15s; white-space: nowrap;
}
.code-btn:hover { color: var(--txt); background: var(--bg2); }
.code-btn.ok { color: var(--green); }
.code-btn svg { width: 10px; height: 10px; }
.code-wrap pre { margin: 0; padding: 12px; overflow-x: auto; }
.code-wrap code {
  font-family: var(--mono); font-size: 11.5px;
  line-height: 1.6; color: var(--txt); white-space: pre;
}

/* ── THINKING ── */
.thinking-row { display: flex; gap: 8px; align-items: flex-start; }
.thinking-body {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  border-radius: 3px 12px 12px 12px;
  background: var(--bg2); border: 1px solid var(--line);
}
.dots { display: flex; gap: 3px; }
.dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue);
  animation: dpulse 1.4s ease-in-out infinite; opacity: 0.5;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dpulse {
  0%,60%,100% { transform: scale(0.8); opacity: 0.4; }
  30%          { transform: scale(1.2); opacity: 1; }
}
.thinking-label { font-size: 11.5px; color: var(--txt2); white-space: nowrap; }
.stop-btn {
  padding: 2px 8px; border-radius: 3px;
  border: 1px solid rgba(248,113,113,0.3);
  background: rgba(248,113,113,0.08);
  color: var(--red); font-size: 10.5px; cursor: pointer;
  font-family: var(--font); white-space: nowrap;
}
.stop-btn:hover { background: rgba(248,113,113,0.15); }

/* ── ERROR ── */
.err-bubble {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 9px 11px; border-radius: 7px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--red); font-size: 12px; line-height: 1.5;
  white-space: normal; word-wrap: break-word;
}
.err-bubble svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }

.warn-bubble {
  display: flex; align-items: flex-start; gap: 7px;
  padding: 9px 11px; border-radius: 7px;
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.2);
  color: var(--amber); font-size: 12px; line-height: 1.5;
  white-space: normal; word-wrap: break-word;
}
.warn-bubble svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }

/* ── COMPOSER ── */
.composer {
  background: var(--bg1);
  border-top: 1px solid var(--line);
  padding: 8px 10px 10px;
  flex-shrink: 0;
}
.attachment-strip { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.attachment-strip:empty { display: none; }
.att-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px; border-radius: 4px;
  background: var(--bg3); border: 1px solid var(--line);
  font-size: 10px; font-family: var(--mono); color: var(--txt2);
  max-width: 180px;
}
.att-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.att-chip button {
  background: none; border: none; color: var(--txt3);
  cursor: pointer; font-size: 12px; line-height: 1; padding: 0;
}
.att-chip button:hover { color: var(--red); }

.composer-box {
  display: flex; align-items: flex-end; gap: 7px;
  padding: 8px 10px;
  border-radius: 10px;
  background: var(--bg2); border: 1px solid var(--line2);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.composer-box:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(79,142,247,0.1);
}
.c-btn {
  width: 26px; height: 26px; border-radius: 5px;
  border: none; background: transparent; color: var(--txt3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: var(--font); flex-shrink: 0;
}
.c-btn:hover { background: var(--bg3); color: var(--txt2); }
.c-btn svg { width: 14px; height: 14px; }
.composer-tools { display: flex; gap: 1px; flex-shrink: 0; }

.c-input {
  flex: 1; min-width: 0;
  min-height: 20px; max-height: 110px;
  padding: 3px 0;
  border: none; background: transparent;
  color: var(--txt); font-family: var(--font);
  font-size: 13px; line-height: 1.5;
  resize: none; outline: none;
  /* CRITICAL */
  white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
}
.c-input::placeholder { color: var(--txt3); }

.c-send {
  width: 30px; height: 30px; border-radius: 7px;
  border: none; background: var(--blue); color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; font-family: var(--font);
}
.c-send:hover { background: #3b7ef6; transform: scale(1.05); }
.c-send:disabled { background: var(--bg3); cursor: not-allowed; transform: none; }
.c-send svg { width: 13px; height: 13px; }

.composer-footer {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 6px; padding: 0 1px;
}
.cfoot-left { display: flex; align-items: center; gap: 7px; }
.slash-hint {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--txt3);
}
.slash-key {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 2px;
  background: var(--bg3); border: 1px solid var(--line2);
  font-size: 9px; font-family: var(--mono); color: var(--txt2);
}
.cfoot-right { font-size: 10px; color: var(--txt3); white-space: nowrap; }

/* ── MENTION DROPDOWN ── */
.mention-drop {
  position: absolute;
  bottom: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--line2);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 -6px 24px rgba(0,0,0,0.4); z-index: 100;
  max-height: 180px; overflow-y: auto;
}
.mention-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; cursor: pointer;
}
.mention-item:hover { background: var(--bg3); }
.mention-ext {
  font-family: var(--mono); font-size: 9px; color: var(--blue);
  background: rgba(79,142,247,0.1); padding: 1px 5px; border-radius: 2px;
  flex-shrink: 0; white-space: nowrap;
}
.mention-name { font-size: 11.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mention-path { font-size: 10px; color: var(--txt3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#file-input, #image-input { display: none; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="brand-name">DevMind</span>
  </div>

  <div class="topbar-center">
    <button class="model-pill">
      <span class="model-dot"></span>
      AI
      <span style="opacity:0.5;font-size:9px;">▾</span>
    </button>
  </div>

  <div class="topbar-right">
    <button class="icon-btn" id="btn-history" title="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5M12 7v5l4 2"/>
      </svg>
    </button>
    <button class="icon-btn" id="btn-new" title="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
    <button class="icon-btn" id="btn-settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="avatar-btn">A</button>
  </div>
</div>

<!-- CONTEXT BAR -->
<div class="ctx-bar" id="ctx-bar">
  <span class="ctx-label">Context</span>
  <div class="ctx-file"><span class="ext">ts</span>&nbsp;index.ts</div>
  <div class="ctx-file"><span class="ext">json</span>&nbsp;package.json</div>
  <button class="ctx-add">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Add file
  </button>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages"></div>

<!-- COMPOSER -->
<div class="composer" style="position:relative;">
  <div class="attachment-strip" id="attachment-strip"></div>
  <div class="composer-box">
    <div class="composer-tools">
      <button class="c-btn" id="btn-attach" title="Attach file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button class="c-btn" id="btn-image" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
    </div>
    <textarea class="c-input" id="input" rows="1" placeholder="Ask DevMind anything… (@ to mention a file)"></textarea>
    <button class="c-send" id="send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="composer-footer">
    <div class="cfoot-left">
      <span class="slash-hint"><span class="slash-key">/</span> commands</span>
      <span class="slash-hint"><span class="slash-key">@</span> files</span>
    </div>
    <span class="cfoot-right" id="usage-label">Ready</span>
  </div>
</div>

<input type="file" id="file-input" accept=".ts,.js,.tsx,.jsx,.json,.md,.css,.html,.py,.go,.rs,.java" multiple />
<input type="file" id="image-input" accept="image/*" multiple />

<script>
const vscode = typeof acquireVsCodeApi !== 'undefined' ? acquireVsCodeApi() : { postMessage: () => {} };
const hasApiKey = typeof __HAS_API_KEY__ !== 'undefined' ? __HAS_API_KEY__ : false;

const msgsEl    = document.getElementById('messages');
const inputEl   = document.getElementById('input');
const sendBtn   = document.getElementById('send');
const fileInput = document.getElementById('file-input');
const imgInput  = document.getElementById('image-input');
const attStrip  = document.getElementById('attachment-strip');
const usageLbl  = document.getElementById('usage-label');

let sending = false;
let currentBotRow = null;
let attachments = [];
let mentionMode = false;
let mentionStart = 0;

// ── WELCOME ──
function showWelcome() {
  msgsEl.innerHTML = '';
  const items = [
    { color:'blue',   icon:'<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>',  title:'Explain file',  prompt:'Explain what the current file does' },
    { color:'green',  icon:'<polyline points="20 6 9 17 4 12"/>',             title:'Write tests',   prompt:'Write unit tests for the current file' },
    { color:'amber',  icon:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',  title:'Find bugs', prompt:'Review this code and find any issues' },
    { color:'purple', icon:'<path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>',  title:'Refactor',  prompt:'Refactor this code for clarity and performance' },
  ];

  const div = document.createElement('div');
  div.className = 'welcome';
  div.innerHTML = `
    <div class="welcome-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h2>How can I help?</h2>
    <p>Ask me to explain, write, debug, or refactor code in your workspace.</p>
    <div class="quick-actions">
      ${items.map(item => `
        <div class="qa-item" data-prompt="${item.prompt}">
          <div class="qa-icon ${item.color}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${item.icon}</svg>
          </div>
          <div class="qa-text">
            <div class="qa-title">${item.title}</div>
            <div class="qa-sub">${item.prompt}</div>
          </div>
          <span class="qa-arrow">›</span>
        </div>
      `).join('')}
    </div>
  `;

  div.querySelectorAll('.qa-item').forEach(el => {
    el.onclick = () => { inputEl.value = el.dataset.prompt; inputEl.focus(); autoResize(); };
  });
  msgsEl.appendChild(div);
}

// ── MARKDOWN PARSER ──
function parseMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // Undo escaping for code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const l = lang || 'code';
      return `<div class="code-wrap"><div class="code-head"><span class="code-lang">${l}</span><div class="code-actions-row"><button class="code-btn" onclick="copyCode(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button><button class="code-btn" onclick="insertCode(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Insert</button></div></div><pre><code>${code.trim()}</code></pre></div>`;
    })
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, m => '<ul>' + m + '</ul>')
    .split('\n\n').map(block => {
      if (block.startsWith('<')) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('');
}

// Safer version that doesn't double-escape (for incremental tokens)
function safeParseMarkdown(text) {
  if (!text) return '';
  try { return parseMarkdown(text); } catch(e) { return '<p>' + text + '</p>'; }
}

// ── ADD USER MSG ──
function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const bubble = document.createElement('div');
  bubble.className = 'user-bubble';
  bubble.textContent = text; // use textContent to avoid XSS
  row.appendChild(bubble);
  msgsEl.appendChild(row);
  scroll();
}

// ── ADD BOT MSG ──
function addBotMsg(html) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="bot-row">
      <div class="bot-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="bot-content">
        <div class="bot-label">DevMind</div>
        <div class="bot-bubble"><div class="md">${html}</div></div>
      </div>
    </div>
  `;
  msgsEl.appendChild(row);
  scroll();
  return row;
}

// ── THINKING ──
function showThinking() {
  removeThinking();
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'thinking';
  row.innerHTML = `
    <div class="thinking-row">
      <div class="bot-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="thinking-body">
        <div class="dots"><span></span><span></span><span></span></div>
        <span class="thinking-label">Generating…</span>
        <button class="stop-btn" onclick="stopGen()">Stop</button>
      </div>
    </div>
  `;
  msgsEl.appendChild(row);
  scroll();
  return row;
}

function removeThinking() {
  document.getElementById('thinking')?.remove();
}

// ── SEND ──
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;
  msgsEl.querySelector('.welcome')?.remove();
  addUserMsg(text);
  inputEl.value = '';
  autoResize();
  sending = true;
  sendBtn.disabled = true;
  currentBotRow = null;
  showThinking();
  vscode.postMessage({ type: 'chat', text, attachments: [...attachments] });
  attachments = [];
  renderAttachments();
}

window.stopGen = function() {
  vscode.postMessage({ type: 'stopGeneration' });
  removeThinking();
  if (currentBotRow) { currentBotRow.remove(); currentBotRow = null; }
  sending = false;
  sendBtn.disabled = false;
};

window.copyCode = function(btn) {
  const code = btn.closest('.code-wrap').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('ok');
    const orig = btn.innerHTML;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = orig; }, 2000);
  });
};

window.insertCode = function(btn) {
  const code = btn.closest('.code-wrap').querySelector('code').textContent;
  vscode.postMessage({ type: 'insertCode', code });
  btn.classList.add('ok');
  btn.textContent = '✓ Inserted';
};

// ── ATTACHMENTS ──
function renderAttachments() {
  if (!attachments.length) { attStrip.innerHTML = ''; return; }
  attStrip.innerHTML = attachments.map((a,i) => `
    <div class="att-chip">
      <span>${a.name}</span>
      <button onclick="removeAtt(${i})">×</button>
    </div>`).join('');
}
window.removeAtt = function(i) { attachments.splice(i,1); renderAttachments(); };

function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
}

inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.onclick = sendMessage;
document.getElementById('btn-new').onclick    = () => vscode.postMessage({ type: 'clear' });
document.getElementById('btn-settings').onclick = () => vscode.postMessage({ type: 'openOnboarding' });
document.getElementById('btn-history').onclick  = () => {};

fileInput.onchange = async () => {
  for (const f of fileInput.files) {
    try { const c = await f.text(); attachments.push({ type:'file', name:f.name, content:c }); } catch{}
  }
  renderAttachments(); fileInput.value = '';
};
imgInput.onchange = async () => {
  for (const f of imgInput.files) {
    const r = new FileReader();
    r.onload = () => { attachments.push({ type:'image', name:f.name, dataUrl:r.result }); renderAttachments(); };
    r.readAsDataURL(f);
  }
  imgInput.value = '';
};
document.getElementById('btn-attach').onclick = () => fileInput.click();
document.getElementById('btn-image').onclick  = () => imgInput.click();

// ── VSCODE MESSAGE HANDLER ──
window.addEventListener('message', e => {
  const m = e.data;
  if (!m || !m.type) return;

  if (m.type === 'thinking') {
    if (m.show) showThinking(); else removeThinking();
    return;
  }

  if (m.type === 'token') {
    if (!m.text) return;
    removeThinking();
    if (!currentBotRow) {
      currentBotRow = addBotMsg('');
    }
    const md = currentBotRow.querySelector('.md');
    if (md) {
      // Append raw text, re-render at 'done'
      md.dataset.raw = (md.dataset.raw || '') + m.text;
      md.innerHTML = safeParseMarkdown(md.dataset.raw);
      scroll();
    }
    return;
  }

  if (m.type === 'done') {
    removeThinking();
    if (currentBotRow) {
      const md = currentBotRow.querySelector('.md');
      if (md) { md.innerHTML = safeParseMarkdown(m.text); delete md.dataset.raw; }
    } else {
      addBotMsg(safeParseMarkdown(m.text));
    }
    currentBotRow = null;
    sending = false;
    sendBtn.disabled = false;
    scroll();
    return;
  }

  if (m.type === 'error') {
    removeThinking();
    if (currentBotRow) { currentBotRow.remove(); currentBotRow = null; }
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `<div class="err-bubble"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${m.text || 'An error occurred.'}</span></div>`;
    msgsEl.appendChild(row); scroll();
    sending = false; sendBtn.disabled = false;
    return;
  }

  if (m.type === 'warning') {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `<div class="warn-bubble"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>${m.text || ''}</span></div>`;
    msgsEl.appendChild(row); scroll();
    return;
  }

  if (m.type === 'cleared') { showWelcome(); return; }

  if (m.type === 'usage') {
    if (m.hasApiKey) {
      usageLbl.textContent = m.remaining + ' req left';
    } else {
      usageLbl.textContent = 'Not connected';
    }
    return;
  }
});

// Init
showWelcome();
vscode.postMessage({ type: 'getUsage' });
</script>
</body>
</html>
