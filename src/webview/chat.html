<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data: blob: __CSP_SOURCE__; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'unsafe-inline';" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0e0f11;--bg1:#13151a;--bg2:#1a1d24;--bg3:#21252f;--bg4:#272b36;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);
  --txt:#e8eaf0;--txt2:#8b909e;--txt3:#555b6a;
  --blue:#4f8ef7;--blue2:#2563eb;--green:#34d399;--amber:#fbbf24;--red:#f87171;--purple:#a78bfa;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'DM Mono','Consolas',monospace;
}
html,body{height:100%}
body{font-family:var(--font);font-size:13px;background:var(--bg0);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden;word-wrap:break-word}

/* ─── TOPBAR ─────────────────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:40px;background:var(--bg1);border-bottom:1px solid var(--line);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:7px}
.brand-logo{width:22px;height:22px;border-radius:5px;overflow:hidden;flex-shrink:0}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block}
.brand-name{font-size:13px;font-weight:600;letter-spacing:-0.02em}
.topbar-right{display:flex;align-items:center;gap:3px}
.icon-btn{width:26px;height:26px;border-radius:5px;border:none;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--bg3);color:var(--txt2)}
.icon-btn svg{width:13px;height:13px}
.icon-btn.active{color:var(--blue);background:rgba(79,142,247,.12)}

/* ─── CONTEXT BAR ────────────────────────────────────────────────────── */
.ctx-bar{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg1);border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;min-height:30px}
.ctx-bar::-webkit-scrollbar{display:none}
.ctx-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--line);font-size:10px;font-family:var(--mono);color:var(--txt2);white-space:nowrap;flex-shrink:0;cursor:default}
.ctx-pill .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ctx-pill.fw .dot{background:#4f8ef7}
.ctx-pill.db .dot{background:#34d399}
.ctx-pill.auth .dot{background:#a78bfa}
.ctx-pill.lang .dot{background:#fbbf24}
.ctx-pill.model .dot{background:#f87171}
.ctx-pill.files .dot{background:#34d399}

/* ─── MAIN LAYOUT (chat + optional file panel) ───────────────────────── */
.main-area{display:flex;flex:1;overflow:hidden}

/* ─── FILE PANEL ─────────────────────────────────────────────────────── */
.file-panel{width:200px;min-width:160px;max-width:260px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.file-panel.hidden{display:none}
.fp-header{padding:8px 10px 6px;border-bottom:1px solid var(--line);flex-shrink:0}
.fp-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}
.fp-search{margin-top:6px;width:100%;padding:4px 8px;border-radius:5px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-size:11px;font-family:var(--font);outline:none}
.fp-search::placeholder{color:var(--txt3)}
.fp-search:focus{border-color:var(--blue)}
.fp-list{flex:1;overflow-y:auto;padding:4px 0}
.fp-list::-webkit-scrollbar{width:3px}
.fp-list::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.fp-item{display:flex;align-items:center;gap:7px;padding:5px 10px;cursor:pointer;transition:background .1s}
.fp-item:hover{background:var(--bg2)}
.fp-item.active{background:rgba(79,142,247,.1)}
.fp-icon{font-size:11px;flex-shrink:0;opacity:.7}
.fp-name{font-size:11px;font-family:var(--mono);color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.fp-path{font-size:9px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fp-item-inner{flex:1;min-width:0}
.fp-add-btn{padding:4px 7px;border:none;background:rgba(79,142,247,.15);color:var(--blue);font-size:10px;font-family:var(--font);border-radius:3px;cursor:pointer;flex-shrink:0}
.fp-add-btn:hover{background:rgba(79,142,247,.25)}
.fp-empty{padding:12px 10px;font-size:11px;color:var(--txt3);text-align:center}

/* ─── MESSAGES ───────────────────────────────────────────────────────── */
.chat-col{display:flex;flex-direction:column;flex:1;overflow:hidden}
.messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px;display:flex;flex-direction:column;gap:6px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* ─── WELCOME ─────────────────────────────────────────────────────────── */
.welcome{display:flex;flex-direction:column;align-items:center;padding:18px 10px;text-align:center;width:100%}
.welcome-logo{width:40px;height:40px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.welcome-logo img{width:26px;height:26px;object-fit:cover;border-radius:3px}
.welcome h2{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.4}
.welcome p{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:14px}
.quick-actions{display:flex;flex-direction:column;gap:4px;width:100%}
.qa-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--bg2);border:1px solid var(--line);cursor:pointer;transition:all .15s;text-align:left}
.qa-item:hover{background:var(--bg3);border-color:var(--line2);transform:translateX(2px)}
.qa-icon{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-icon svg{width:11px;height:11px}
.qa-icon.blue{background:rgba(79,142,247,.15);color:var(--blue)}
.qa-icon.green{background:rgba(52,211,153,.15);color:var(--green)}
.qa-icon.amber{background:rgba(251,191,36,.15);color:var(--amber)}
.qa-icon.purple{background:rgba(167,139,250,.15);color:var(--purple)}
.qa-icon.red{background:rgba(248,113,113,.15);color:var(--red)}
.qa-text{flex:1;min-width:0}
.qa-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qa-sub{font-size:10px;color:var(--txt3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qa-kbd{font-family:var(--mono);font-size:9px;background:var(--bg3);border:1px solid var(--line2);padding:1px 5px;border-radius:3px;color:var(--txt3);flex-shrink:0}

/* ─── MESSAGES ───────────────────────────────────────────────────────── */
.msg-row{display:flex;flex-direction:column;width:100%;animation:msgIn .18s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{align-items:flex-end;margin:3px 0}
.msg-row.bot{align-items:flex-start;margin:3px 0}
.user-bubble{max-width:88%;padding:8px 12px;border-radius:14px 14px 3px 14px;background:var(--blue2);color:#fff;font-size:13px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.bot-row{display:flex;gap:7px;align-items:flex-start;width:100%}
.bot-avatar{width:22px;height:22px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.bot-avatar img{width:14px;height:14px;object-fit:cover;border-radius:2px}
.bot-content{flex:1;min-width:0;overflow:hidden}
.bot-label{font-size:10px;color:var(--txt3);margin-bottom:3px;font-weight:500;text-transform:uppercase}
.bot-bubble{background:var(--bg2);border:1px solid var(--line);border-radius:3px 12px 12px 12px;padding:9px 11px;font-size:13px;line-height:1.65;word-wrap:break-word;overflow-wrap:break-word}

/* ─── MARKDOWN ───────────────────────────────────────────────────────── */
.md{display:block;width:100%;white-space:normal;word-wrap:break-word}
.md p{display:block;margin-bottom:7px}
.md p:last-child{margin-bottom:0}
.md h1,.md h2{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;border-bottom:1px solid var(--line);padding-bottom:3px}
.md h3{display:block;font-size:13px;font-weight:600;margin:9px 0 3px}
.md ul,.md ol{padding-left:15px;margin:5px 0}
.md li{margin:2px 0;color:var(--txt2);font-size:12.5px}
.md code:not(pre code){font-family:var(--mono);font-size:11px;padding:1px 4px;border-radius:3px;background:var(--bg3);border:1px solid var(--line2);color:var(--blue);word-break:break-all}
.md strong{font-weight:600;color:var(--txt)}
.md hr{border:none;border-top:1px solid var(--line);margin:8px 0}

/* code block */
.code-wrap{margin:7px 0;border-radius:6px;background:var(--bg0);border:1px solid var(--line2);overflow:hidden}
.code-head{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;border-bottom:1px solid var(--line)}
.code-lang{font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--blue)}
.code-acts{display:flex;gap:3px}
.code-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;border:none;background:var(--bg3);color:var(--txt3);font-size:10px;cursor:pointer;font-family:var(--font);transition:color .1s}
.code-btn:hover{color:var(--txt)}
.code-btn.ok{color:var(--green)}
.code-btn svg{width:9px;height:9px}
.code-wrap pre{margin:0;padding:10px;overflow-x:auto}
.code-wrap code{font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--txt);white-space:pre}

/* thinking */
.thinking-row{display:flex;gap:7px;align-items:flex-start}
.thinking-body{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:3px 12px 12px 12px;background:var(--bg2);border:1px solid var(--line)}
.dots{display:flex;gap:3px}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--blue);animation:dp 1.4s ease-in-out infinite;opacity:.5}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,60%,100%{transform:scale(.8);opacity:.4}30%{transform:scale(1.2);opacity:1}}
.thinking-label{font-size:11.5px;color:var(--txt2)}
.stop-btn{padding:2px 7px;border-radius:3px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.08);color:var(--red);font-size:10px;cursor:pointer;font-family:var(--font)}

/* info/err/warn */
.err-bubble{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;border-radius:7px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);font-size:12px;line-height:1.5;word-wrap:break-word}
.err-bubble svg{width:12px;height:12px;flex-shrink:0;margin-top:1px}
.warn-bubble{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;border-radius:7px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:var(--amber);font-size:12px;line-height:1.5}
.info-bubble{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;border-radius:7px;background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);color:var(--blue);font-size:12px;line-height:1.5}
.info-bubble svg,.warn-bubble svg{width:12px;height:12px;flex-shrink:0;margin-top:1px}

/* ─── @ MENTION DROPDOWN ─────────────────────────────────────────────── */
.mention-drop{position:absolute;bottom:calc(100% + 4px);left:10px;right:10px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;overflow:hidden;box-shadow:0 -6px 20px rgba(0,0,0,.45);z-index:200;max-height:200px;overflow-y:auto}
.mention-drop::-webkit-scrollbar{width:3px}
.mention-drop::-webkit-scrollbar-thumb{background:var(--bg3)}
.mention-hdr{padding:5px 10px;font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px}
.mention-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .1s}
.mention-item:hover,.mention-item.active{background:var(--bg3)}
.mi-icon{font-size:12px;flex-shrink:0;opacity:.6}
.mi-name{font-size:11px;font-family:var(--mono);color:var(--txt);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-path{font-size:9px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-inner{flex:1;min-width:0}

/* ─── SLASH DROPDOWN ─────────────────────────────────────────────────── */
.slash-drop{position:absolute;bottom:calc(100% + 4px);left:10px;right:10px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;overflow:hidden;box-shadow:0 -6px 20px rgba(0,0,0,.45);z-index:200;max-height:220px;overflow-y:auto}
.slash-drop::-webkit-scrollbar{width:3px}
.slash-drop::-webkit-scrollbar-thumb{background:var(--bg3)}
.slash-hdr{padding:5px 10px;font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line)}
.slash-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;transition:background .1s}
.slash-item:hover,.slash-item.active{background:var(--bg3)}
.slash-cmd{font-family:var(--mono);font-size:11px;color:var(--blue);min-width:110px;font-weight:500}
.slash-desc{font-size:11px;color:var(--txt2)}
.slash-kbd{margin-left:auto;font-size:9px;color:var(--txt3);font-family:var(--mono);flex-shrink:0}

/* ─── COMPOSER ───────────────────────────────────────────────────────── */
.composer{background:var(--bg1);border-top:1px solid var(--line);padding:6px 10px 8px;flex-shrink:0;position:relative}
.att-strip{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.att-strip:empty{display:none}
.att-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--line);font-size:10px;font-family:var(--mono);color:var(--txt2);max-width:160px}
.att-chip.mention{border-color:rgba(79,142,247,.4);background:rgba(79,142,247,.08);color:var(--blue)}
.att-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-chip button{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:0;line-height:1}
.att-chip button:hover{color:var(--red)}
.composer-box{display:flex;align-items:flex-end;gap:6px;padding:6px 9px;border-radius:9px;background:var(--bg2);border:1px solid var(--line2);transition:border-color .15s}
.composer-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,142,247,.1)}
.c-btn{width:24px;height:24px;border-radius:5px;border:none;background:transparent;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.c-btn:hover{background:var(--bg3);color:var(--txt2)}
.c-btn svg{width:13px;height:13px}
.c-input{flex:1;min-width:0;min-height:20px;max-height:100px;padding:2px 0;border:none;background:transparent;color:var(--txt);font-family:var(--font);font-size:13px;line-height:1.5;resize:none;outline:none;white-space:pre-wrap;word-wrap:break-word}
.c-input::placeholder{color:var(--txt3)}
.c-send{width:28px;height:28px;border-radius:6px;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.c-send:hover{background:#3b7ef6}
.c-send:disabled{background:var(--bg3);cursor:not-allowed}
.c-send svg{width:12px;height:12px}
.composer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding:0 1px}
.cfoot-left{display:flex;align-items:center;gap:6px}
.hint{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--txt3)}
.hint-key{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:2px;background:var(--bg3);border:1px solid var(--line2);font-size:9px;font-family:var(--mono);color:var(--txt2)}
.cfoot-right{font-size:10px;color:var(--txt3)}
#file-input{display:none}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="brand-logo" id="brand-logo-wrap">
      <img src="__LOGO_URI__" alt="DevMind" id="brand-img" onerror="this.style.display='none'" />
    </div>
    <span class="brand-name">DevMind</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="btn-files" title="Toggle file browser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v13h18V7M3 7l4-4h10l4 4M3 7h18"/></svg>
    </button>
    <button class="icon-btn" id="btn-scaffold" title="Project Scaffolding (Ctrl+Shift+S)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17.5h7M17.5 14v7"/></svg>
    </button>
    <button class="icon-btn" id="btn-new" title="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="icon-btn" id="btn-settings" title="Account & Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </button>
  </div>
</div>

<!-- CONTEXT BAR -->
<div class="ctx-bar" id="ctx-bar">
  <div class="ctx-pill lang"><span class="dot"></span><span id="ctx-lang">TS</span></div>
  <div class="ctx-pill fw" id="ctx-fw-pill" style="display:none"><span class="dot"></span><span id="ctx-fw">—</span></div>
  <div class="ctx-pill db" id="ctx-db-pill" style="display:none"><span class="dot"></span><span id="ctx-db">—</span></div>
  <div class="ctx-pill auth" id="ctx-auth-pill" style="display:none"><span class="dot"></span><span id="ctx-auth">—</span></div>
  <div class="ctx-pill files"><span class="dot"></span><span id="ctx-files">0 files</span></div>
  <div class="ctx-pill model"><span class="dot"></span>DeepSeek</div>
</div>

<!-- MAIN AREA: file panel + chat -->
<div class="main-area">

  <!-- FILE PANEL -->
  <div class="file-panel hidden" id="file-panel">
    <div class="fp-header">
      <div class="fp-title">
        <span>Files</span>
        <span id="fp-count" style="color:var(--txt3);font-weight:400">0</span>
      </div>
      <input class="fp-search" id="fp-search" placeholder="Search files…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="fp-list" id="fp-list">
      <div class="fp-empty">Indexing workspace…</div>
    </div>
  </div>

  <!-- CHAT COL -->
  <div class="chat-col">
    <div class="messages" id="messages"></div>

    <div class="composer">
      <div class="att-strip" id="att-strip"></div>

      <!-- DROPDOWNS anchored inside composer for correct positioning -->
      <div class="mention-drop" id="mention-drop" style="display:none"></div>
      <div class="slash-drop"   id="slash-drop"   style="display:none"></div>

      <div class="composer-box">
        <button class="c-btn" id="btn-attach" title="Attach file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea class="c-input" id="input" rows="1" placeholder="Ask DevMind… (/ commands · @ files)"></textarea>
        <button class="c-send" id="send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="composer-footer">
        <div class="cfoot-left">
          <span class="hint"><span class="hint-key">/</span> commands</span>
          <span class="hint"><span class="hint-key">@</span> files</span>
          <span class="hint"><span class="hint-key">⇧↵</span> newline</span>
        </div>
        <span class="cfoot-right" id="usage-lbl">—</span>
      </div>

</div>

<script>
/* ─── STATE ───────────────────────────────────────────────────────────── */

/* ─── SLASH COMMANDS ──────────────────────────────────────────────────── */
var SLASH_CMDS = [

  { cmd:'/tree',        desc:'Refresh codebase file tree',    kbd:'' },

];

function showSlash(filter) {
  var cmds = SLASH_CMDS.filter(function(c){ return !filter || c.cmd.slice(1).startsWith(filter.toLowerCase()); });
  if (!cmds.length) { hideDropdowns(); return; }

  slashDrop.querySelectorAll('.slash-item').forEach(function(el){
    el.addEventListener('mousedown',function(e){ e.preventDefault(); selectSlash(el.dataset.cmd); });

}

function selectSlash(cmd) {
  inputEl.value = cmd + ' '; autoResize(); hideDropdowns(); inputEl.focus();
}

/* ─── @ MENTION ──────────────────────────────────────────────────────── */
function requestMentionSearch(query) {
  dropMode = 'mention';
  vscode.postMessage({ type:'searchFiles', query: query });
}

function showMentionResults(results) {
  if (!results || !results.length) { hideDropdowns(); return; }
  mentionIdx = -1;
  mentionDrop.innerHTML = '<div class="mention-hdr"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Files</div>';
  results.forEach(function(f,i){
    var ext = f.name.split('.').pop() || '';
    var icon = getFileIcon(ext);
    var div = document.createElement('div');
    div.className = 'mention-item';
    div.dataset.path = f.path;
    div.dataset.name = f.name;
    div.innerHTML = '<span class="mi-icon">'+icon+'</span><div class="mi-inner"><div class="mi-name">'+esc(f.name)+'</div><div class="mi-path">'+esc(f.path)+'</div></div>';
    div.addEventListener('mousedown', function(e){ e.preventDefault(); selectMention(f.path, f.name); });
    mentionDrop.appendChild(div);
  });
  mentionDrop.style.display='block';
  slashDrop.style.display='none';
}

function selectMention(filePath, fileName) {
  var val = inputEl.value;
  var atIdx = val.lastIndexOf('@', inputEl.selectionStart - 1);
  if (atIdx < 0) atIdx = val.lastIndexOf('@');
  if (atIdx >= 0) {
    inputEl.value = val.slice(0, atIdx) + '@' + fileName + ' ' + val.slice(inputEl.selectionStart);
    var newPos = atIdx + fileName.length + 2;
    inputEl.setSelectionRange(newPos, newPos);
  }
  // Track mentioned file
  if (!mentionedFiles.find(function(m){ return m.path === filePath; })) {
    mentionedFiles.push({ path: filePath, name: fileName });
    renderAttachments();
  }
  hideDropdowns(); inputEl.focus(); autoResize();
}

function navigateDrop(dir) {
  if (dropMode === 'slash') {
    var items = slashDrop.querySelectorAll('.slash-item');
    if (!items.length) return;
    items.forEach(function(el){ el.classList.remove('active'); });
    slashIdx = (slashIdx + dir + items.length) % items.length;
    items[slashIdx].classList.add('active');
    items[slashIdx].scrollIntoView({ block:'nearest' });
  } else if (dropMode === 'mention') {
    var mitems = mentionDrop.querySelectorAll('.mention-item');
    if (!mitems.length) return;
    mitems.forEach(function(el){ el.classList.remove('active'); });
    mentionIdx = (mentionIdx + dir + mitems.length) % mitems.length;
    mitems[mentionIdx].classList.add('active');
    mitems[mentionIdx].scrollIntoView({ block:'nearest' });
  }
}

function confirmDrop(key) {
  if (dropMode === 'slash') {
    var active = slashDrop.querySelector('.slash-item.active') || slashDrop.querySelector('.slash-item');
    if (active) { if(key==='Tab') selectSlash(active.dataset.cmd); else if(key==='Enter') selectSlash(active.dataset.cmd); return true; }
  } else if (dropMode === 'mention') {
    var mactive = mentionDrop.querySelector('.mention-item.active') || mentionDrop.querySelector('.mention-item');
    if (mactive) { selectMention(mactive.dataset.path, mactive.dataset.name); return true; }
  }
  return false;
}

function hideDropdowns() {
  slashDrop.style.display='none'; mentionDrop.style.display='none'; dropMode=''; slashIdx=-1; mentionIdx=-1;
}

/* ─── FILE PANEL ─────────────────────────────────────────────────────── */
var filePanelOpen = false;

function toggleFilePanel() {
  filePanelOpen = !filePanelOpen;
  if (filePanelOpen) { filePanel.classList.remove('hidden'); document.getElementById('btn-files').classList.add('active'); }
  else { filePanel.classList.add('hidden'); document.getElementById('btn-files').classList.remove('active'); }
}

function renderFileList(files, query) {
  if (!files || !files.length) {
    fpList.innerHTML = '<div class="fp-empty">'+(query ? 'No matches' : 'No files indexed')+'</div>';
    return;
  }
  var html = '';
  var shown = files.slice(0, 100);
  shown.forEach(function(f){
    var ext = f.name.split('.').pop() || '';
    var icon = getFileIcon(ext);
    html += '<div class="fp-item" data-path="'+esc(f.path)+'" data-name="'+esc(f.name)+'">'
      +'<span class="fp-icon">'+icon+'</span>'
      +'<div class="fp-item-inner"><div class="fp-name">'+esc(f.name)+'</div><div class="fp-path">'+esc(f.path)+'</div></div>'
      +'<button class="fp-add-btn" title="Mention in chat">@</button>'
      +'</div>';
  });
  fpList.innerHTML = html;
  fpList.querySelectorAll('.fp-item').forEach(function(el){
    var addBtn = el.querySelector('.fp-add-btn');
    addBtn && addBtn.addEventListener('click', function(e){
      e.stopPropagation();
      selectMention(el.dataset.path, el.dataset.name);
    });
    el.addEventListener('click', function(e){
      if (e.target === addBtn) return;
      vscode.postMessage({ type:'openFile', path: el.dataset.path });
    });
  });
}

/* ─── FILE ICON HELPER ───────────────────────────────────────────────── */
function getFileIcon(ext) {
  var icons = { ts:'🔷', tsx:'🔷', js:'🟡', jsx:'🟡', py:'🐍', go:'🐹', rs:'🦀', java:'☕',
    json:'📋', md:'📝', css:'🎨', scss:'🎨', html:'🌐', yaml:'⚙️', yml:'⚙️',
    sh:'📜', env:'🔑', sql:'🗃️', toml:'⚙️', default:'📄' };
  return icons[ext] || icons.default;
}

/* ─── HELPERS ─────────────────────────────────────────────────────────── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }
function autoResize() { inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,100)+'px'; }

/* ─── MARKDOWN RENDERER ──────────────────────────────────────────────── */
function renderMd(raw) {
  if (!raw) return '';
  var blocks = [];
  var t = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,lang,code){
    var l = esc(lang||'code'), c = esc(code.trim()), i = blocks.length;
    blocks.push('<div class="code-wrap"><div class="code-head"><span class="code-lang">'+l+'</span>'
      +'<div class="code-acts">'
      +'<button class="code-btn" onclick="doCopy(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>'
      +'<button class="code-btn" onclick="doInsert(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Insert</button>'
      +'</div></div><pre><code>'+c+'</code></pre></div>');
    return '\x00B'+i+'\x00';
  });
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1} (.+)$/gm,'<h1>$1</h1>').replace(/^#{2} (.+)$/gm,'<h2>$1</h2>').replace(/^#{3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^---$/gm,'<hr>').replace(/^[\-\*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,function(m){return'<ul>'+m+'</ul>';});
  t = t.replace(/\x00B(\d+)\x00/g,function(_,i){return blocks[parseInt(i)];});
  return t.split(/\n{2,}/).map(function(p){
    if(/^<[hudo]|<div|<pre|<hr/.test(p.trim()))return p;
    return'<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('');
}

    {cls:'purple',icon:'<path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>',            t:'Refactor code',   s:'Improve quality and performance',     p:'Refactor the selected code for clarity, performance, and best practices'},

  var logo = '<div class="welcome-logo"><img src="__LOGO_URI__" alt="DM" onerror="this.parentElement.innerHTML=\'<svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;white&quot; stroke-width=&quot;2.5&quot; width=&quot;20&quot; height=&quot;20&quot;><path d=&quot;M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5&quot;/></svg>\'" /></div>';

      +'<div style="font-size:12px;font-weight:600;color:#7eb8f9;margin-bottom:3px">Connect your account</div>'
      +'<div style="font-size:11px;color:#8b909e;line-height:1.6">Sign up at the DevMind dashboard, verify with Gmail OTP, then paste your API key via DevMind: Set API Key.</div>'
      +'<button onclick="vscode.postMessage({type:\'openOnboarding\'})" style="margin-top:8px;padding:5px 11px;border-radius:6px;background:#4f8ef7;color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer">Open dashboard</button>'

      if (p.startsWith('/')) { vscode.postMessage({type:'slash',command:p.slice(1),args:''}); }

/* ─── MESSAGE HELPERS ─────────────────────────────────────────────────── */
function addUserMsg(text) {
  var row=document.createElement('div'); row.className='msg-row user';
  var b=document.createElement('div'); b.className='user-bubble'; b.textContent=text;
  row.appendChild(b); msgsEl.appendChild(row); scroll();
}
function makeBotRow() {
  var row=document.createElement('div'); row.className='msg-row bot';
  row.innerHTML='<div class="bot-row"><div class="bot-avatar"><img src="__LOGO_URI__" alt="DM" onerror="this.style.display=\'none\'" /></div>'
    +'<div class="bot-content"><div class="bot-label">DevMind</div>'
    +'<div class="bot-bubble"><div class="md"></div></div></div></div>';
  return row;
}
function showThinking() {
  removeThinking();
  var row=document.createElement('div'); row.className='msg-row bot'; row.id='thinking';
  row.innerHTML='<div class="thinking-row"><div class="bot-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>'
    +'<div class="thinking-body"><div class="dots"><span></span><span></span><span></span></div>'
    +'<span class="thinking-label">Thinking…</span>'
    +'<button class="stop-btn" onclick="stopGen()">Stop</button></div></div>';
  msgsEl.appendChild(row); scroll();
}
function removeThinking(){ var t=document.getElementById('thinking'); if(t)t.remove(); }
function addErrMsg(text){ var row=document.createElement('div'); row.className='msg-row bot'; row.innerHTML='<div class="err-bubble"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>'+esc(text)+'</span></div>'; msgsEl.appendChild(row); scroll(); }
function addInfoMsg(text){ var row=document.createElement('div'); row.className='msg-row bot'; row.innerHTML='<div class="info-bubble"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><span>'+esc(text)+'</span></div>'; msgsEl.appendChild(row); scroll(); }

/* ─── SEND ────────────────────────────────────────────────────────────── */
function sendMessage() {
  var text = inputEl.value.trim();
  if (!text || sending) return;

  // Slash command
  if (text.startsWith('/')) {
    var parts = text.slice(1).split(' '), cmd=parts[0].toLowerCase(), args=parts.slice(1).join(' ');
    inputEl.value=''; autoResize(); hideDropdowns();
    if (cmd==='clear'){ vscode.postMessage({type:'clear'}); return; }
    vscode.postMessage({type:'slash',command:cmd,args:args});
    return;
  }

  msgsEl.querySelector('.welcome') && msgsEl.querySelector('.welcome').remove();
  addUserMsg(text);
  inputEl.value=''; autoResize();
  sending=true; sendBtn.disabled=true; currentBotRow=null; rawBuffer='';
  showThinking();

  vscode.postMessage({
    type:           'chat',
    text:           text,
    attachments:    attachments.slice(),
    mentionedFiles: mentionedFiles.slice(),
  });

  // Clear mentions after send (keep file attachments but clear @ mentions from chip display)
  mentionedFiles = [];
  attachments    = [];
  renderAttachments();
}

window.stopGen = function() {
  vscode.postMessage({type:'stopGeneration'});
  removeThinking();
  if(currentBotRow){currentBotRow.remove();currentBotRow=null;}
  rawBuffer=''; sending=false; sendBtn.disabled=false;
};
window.doCopy = function(btn) {
  var code=btn.closest('.code-wrap').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(function(){
    btn.classList.add('ok'); var orig=btn.innerHTML; btn.textContent='✓ Copied';
    setTimeout(function(){btn.classList.remove('ok');btn.innerHTML=orig;},2000);
  });
};
window.doInsert = function(btn) {
  var code=btn.closest('.code-wrap').querySelector('code').textContent;
  vscode.postMessage({type:'insertCode',code:code,description:'Code from chat'});
  btn.classList.add('ok'); var orig=btn.innerHTML; btn.textContent='✓ Sent';
  setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('ok');},2000);
};

/* ─── ATTACHMENTS ─────────────────────────────────────────────────────── */
function renderAttachments() {
  if (!attachments.length && !mentionedFiles.length) { attStrip.innerHTML=''; return; }
  var html = '';
  attachments.forEach(function(a,i){
    html += '<div class="att-chip"><span>📎 '+esc(a.name)+'</span><button onclick="removeAtt('+i+')">×</button></div>';
  });
  mentionedFiles.forEach(function(m,i){
    html += '<div class="att-chip mention"><span>@ '+esc(m.name)+'</span><button onclick="removeMention('+i+')">×</button></div>';
  });
  attStrip.innerHTML = html;
}
window.removeAtt     = function(i){ attachments.splice(i,1); renderAttachments(); };
window.removeMention = function(i){ mentionedFiles.splice(i,1); renderAttachments(); };

fileInput.addEventListener('change', function(){
  var files=Array.from(fileInput.files);
  Promise.all(files.map(function(f){ return f.text().then(function(c){attachments.push({type:'file',name:f.name,content:c});}).catch(function(){}); })).then(renderAttachments);
  fileInput.value='';
});

/* ─── INPUT EVENTS ────────────────────────────────────────────────────── */
inputEl.addEventListener('input', function(){
  autoResize();
  var val = inputEl.value;
  var cur = inputEl.selectionStart;

  // Slash
  if (val === '/') { showSlash(''); return; }
  if (val.startsWith('/') && !val.includes(' ')) { showSlash(val.slice(1)); return; }

  // @ mention — find last @ before cursor
  var beforeCursor = val.slice(0, cur);
  var atIdx = beforeCursor.lastIndexOf('@');
  if (atIdx >= 0) {
    var query = beforeCursor.slice(atIdx + 1);
    // Only trigger if no space after @
    if (!query.includes(' ')) {
      requestMentionSearch(query);
      return;
    }
  }
  hideDropdowns();
});

inputEl.addEventListener('keydown', function(e){
  if (dropMode) {
    if (e.key==='ArrowDown') { e.preventDefault(); navigateDrop(1); return; }
    if (e.key==='ArrowUp')   { e.preventDefault(); navigateDrop(-1); return; }
    if (e.key==='Tab' || (e.key==='Enter' && dropMode)) {
      if (confirmDrop(e.key)) { e.preventDefault(); return; }
    }
    if (e.key==='Escape') { hideDropdowns(); return; }
  }
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.addEventListener('click', function(e){
  if (!slashDrop.contains(e.target) && !mentionDrop.contains(e.target) && e.target!==inputEl) hideDropdowns();
});

/* ─── FILE PANEL SEARCH ───────────────────────────────────────────────── */
fpSearch.addEventListener('input', function(){
  var q = fpSearch.value.trim();
  var filtered = q
    ? allFiles.filter(function(f){ return f.name.toLowerCase().includes(q.toLowerCase()) || f.path.toLowerCase().includes(q.toLowerCase()); })
    : allFiles;
  renderFileList(filtered, q);
});

/* ─── BUTTON HANDLERS ─────────────────────────────────────────────────── */
sendBtn.addEventListener('click', sendMessage);
document.getElementById('btn-new').addEventListener('click',      function(){ vscode.postMessage({type:'clear'}); });
document.getElementById('btn-settings').addEventListener('click', function(){ vscode.postMessage({type:'openOnboarding'}); });

document.getElementById('btn-attach').addEventListener('click',   function(){ fileInput.click(); });
document.getElementById('btn-files').addEventListener('click',    function(){ toggleFilePanel(); vscode.postMessage({type:'getFileTree'}); });

/* ─── VSCODE MESSAGE HANDLER ──────────────────────────────────────────── */
window.addEventListener('message', function(e){
  var m = e.data;
  if (!m || !m.type) return;

  if (m.type==='thinking') { if(m.show)showThinking(); else removeThinking(); return; }

  if (m.type==='token') {
    if (!m.text) return;
    removeThinking();
    if (!currentBotRow) { currentBotRow=makeBotRow(); msgsEl.appendChild(currentBotRow); }
    rawBuffer += m.text;
    var md = currentBotRow.querySelector('.md');
    if (md) { md.innerHTML=renderMd(rawBuffer); scroll(); }
    return;
  }

  if (m.type==='done') {
    removeThinking();
    var final = m.text || rawBuffer;
    if (currentBotRow) { var md2=currentBotRow.querySelector('.md'); if(md2)md2.innerHTML=renderMd(final); }
    else if (final) { var row=makeBotRow(); msgsEl.appendChild(row); var md3=row.querySelector('.md'); if(md3)md3.innerHTML=renderMd(final); }
    currentBotRow=null; rawBuffer=''; sending=false; sendBtn.disabled=false; scroll();
    return;
  }

  if (m.type==='error') {
    removeThinking();
    if(currentBotRow){currentBotRow.remove();currentBotRow=null;} rawBuffer='';
    addErrMsg(m.text||'An error occurred.');
    sending=false; sendBtn.disabled=false; return;
  }

  if (m.type==='warning') {
    var wr=document.createElement('div'); wr.className='msg-row bot';
    wr.innerHTML='<div class="warn-bubble"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>'+esc(m.text||'')+'</span></div>';
    msgsEl.appendChild(wr); scroll(); return;
  }

  if (m.type==='info') { addInfoMsg(m.text||''); return; }

  if (m.type==='cleared') { showWelcome(); return; }

  /* ── File search results (for @ mention dropdown) ── */
  if (m.type==='fileSearchResults') {
    if (dropMode==='mention' || !dropMode) showMentionResults(m.results||[]);
    return;
  }

  /* ── Full file tree (for file panel) ── */
  if (m.type==='fileTree') {
    allFiles = m.files || [];
    fpCount.textContent = allFiles.length;
    document.getElementById('ctx-files').textContent = allFiles.length + ' files';
    if (filePanelOpen) renderFileList(allFiles, fpSearch.value.trim());
    return;
  }

  /* ── Usage / project context ── */
  if (m.type==='usage') {
    HAS_API_KEY = m.hasApiKey;
    usageLbl.textContent = m.hasApiKey
      ? (m.remaining + ' left · ' + (m.plan||'free').toUpperCase())
      : 'Not connected';
    if (m.language)  document.getElementById('ctx-lang').textContent = m.language.toUpperCase().slice(0,4);
    if (m.framework && m.framework!=='Node.js') {
      document.getElementById('ctx-fw').textContent = m.framework;
      document.getElementById('ctx-fw-pill').style.display='';
    }
    if (m.database && m.database!=='none') {
      document.getElementById('ctx-db').textContent = m.database;
      document.getElementById('ctx-db-pill').style.display='';
    }
    if (m.authSystem && m.authSystem!=='none') {
      document.getElementById('ctx-auth').textContent = m.authSystem;
      document.getElementById('ctx-auth-pill').style.display='';
    }
    if (m.fileCount !== undefined) {
      document.getElementById('ctx-files').textContent = m.fileCount + ' files';
      fpCount.textContent = m.fileCount;
    }
    return;
  }
});

/* ─── INIT ────────────────────────────────────────────────────────────── */
showWelcome();
vscode.postMessage({type:'getUsage'});
vscode.postMessage({type:'getFileTree'});
</script>
